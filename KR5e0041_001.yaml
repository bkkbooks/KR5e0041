  text: 三洞珠囊卷之一懷一
  hash: sha256:422102205b210babf8261e78b9617ac7e0cc9c5d3e36f5439dbfae515703340d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_HFL_001-001a, image: hfl/0780/0780-004.png}
body:
  text: 大唐陸海羽客王懸河修救導品道學傳第四云任敦字尚能博昌人永嘉中投雲陽山雲陽山者即茅山也服赤石脂時復出入人間皆手執經科教示愚民於是遠近穆然從化敦竊歎曰衆人雖云慕善皆外好耳未見真心可與斷金者又云杜炅字子恭及壯識信精勤宗事正一少參天師治籙以之化導接濟周普行已精潔虛心拯物不求信施遂立治靜廣宣救護莫不立驗也又云陸納為尚書令時年四十患瘡告炅云奕世短壽臨終皆患此瘡炅為奏章又與靈飛散謂曰君厄命已過可至七十果如其言也第五卷云嚴君平者名遵蜀都人也修道自保與人子言依於孝與人臣言依於忠與人弟言依於順各因其發導之以善蜀中化之從其言者過半也又云劉凝之字志安小名長年南郡枝江人也居衡山之陽採藥服食受天師化民之道夫妻並共佩帶救物災危亟有神驗也第六卷云諸慧開字智遠吳興烏程人也每以戒行自修拯濟為務齊大明八年天下飢饉慧開薄有穀實乃悉分恤窮匱鄉邑賴之有三人積飢食飽而致死其家訴縣稱慧開飼殺飢人苦相誣謗縣令笑曰乞食飽死反怨主人法無此科而遣不問也第七卷云陸先生宋文帝召之於內講理説法不捨晨夜孜孜誘勸無倦於時也第八卷云陶弘景字通明魏郡平陽人也自號華陽隱居好行陰德拯濟困窮恆合諸驗藥給施疾者遠近賴之也第九卷云潘洪字文盛會稽山陰人也為性好賑施一冬數過作寒服為施貧乏隨捨更營也第十卷云東鄉宗超字逸倫高密黔陬人也亟經凶年常大施食遠近投集日中甚衆每至冬天輒多作襦襖隨緣寄人使為布施也又云嚴寄之字靜處丹陽句容人也輕財好施拯濟困窮知識道義有縣官疾惱輒潛為禮𧵥事效私辦酬賽至時也又云方謙之字道沖冀州趙郡柏縣人也入於潛天目山化被鄉村改惡行善請業依仁回向大法又云掩骼音格埋枯周窮濟急也邵陵王屢遣延請謙之不與相見行人至館嘗或相值而厚加賂遺也又云張玄徹字文舉司州義陽郡人也梁末大亂相隨入東緣糊口略存性命而恆與諸飢人共器煮食徹性仁讓不處他先常推鐺火使人前用雖有升合熟食每居後日日如此轉就困弊因之羸痿一旦而終由其後已先物故遂再其生也又云褚雅字玄通吳郡錢塘人也梁末時隱句曲山重施輕財拯物無厭營田若熟以乞貧者與人共居常早起灑掃取水遍以周給覓樵薪乞人或夏月種瓜恣人來取也又云章旻字高明宣城人也手植松檟他有遺助一無所留特好賑施不畜財産法赴所收隨得隨散每出險難之所或他有禁物或同行有礙公私事緣不能自扶者旻輒方便負荷必使過度也又升壇之夜祁寒酷烈旻露左手執燭至曉不懈每赴人法事躬親下役掃除穢濁盡其力用暑必讓帷帳寒則推衣被也第十三卷云孟道養字孝元外名援平昌人也立性慈仁全以賑施為務飢年多餓死常作食餉之每恨貧乏施與不得稱心也第十四卷云孫遊嶽字玄達東陽永康人也殷勤誘接服膺受業者常數百人也又云雙子辨者梁時人也斷榖休糧長齋苦行出廣州布化南海稱為主人也又云許明業扶風赤岡人梁太清時人少年出家長齋蔬食周行山水拯濟為務是時飢荒人民困乏明業恆行賑救來者必給飲食身率門人作田播種稻粟微熟自往遠近要呼貧者任力收穫行見寒凍即解衣以施隆冬之月自服單布每進城中功德所獲物即於主人處散未曾將出城門若有病者諸營功德方便不赴命必不全若至人家忽匆匆去此處必有殃禍也第十五卷云陸逸沖字敬遊海鹽陽瀆人也少篤道法接物則貴賤均意善於撫衆為遠近所依也又云鄒榮字文繪臨海章安人也少而出家為人幹事接物不偏也第十六卷云殷仲堪者陳郡人也為太子中庶子少奉天師道受治及正一精心事法不吝財賄家有疾病躬為章符往往有應鄉人及左右或請為之時行周救弘益不少也第十八卷云鄧郁之字玄達南陽新野人也嘗夢一鳥吐印以與之自是民間有疾輒以印治救不為章符病者自愈也又云諸葛綝字茂倫琅瑘人也奉道清潔每絶穀救他人疾及與自治皆不服藥餌唯飲勑水莫不蒙差太元中綝眼臉上忽生瘤贅便就道門請水澡濯少日稍差也又云濮陽不知何許人也事道專心祈請即驗鄭鮷音啼女腳患跛躄就陽請水濯足餘以灌庭中枯棗樹棗樹即生腳亦隨差晉簡文既廢世子而後無息陽時在第密為祈請三更中有黃氣起自西南徑墮室爾夜李太后即懷孝武冥道之力第二十卷云暨慧琰吳興餘杭人也幼出家為比丘尼後捨尼為女道士遂入居天目山斷穀服食人有疾急施一符莫不立愈也列仙傳上云太山下石父賣藥都市父自言三百歲後有疫氣民死者萬計長史至父所請救擁朱幡繫黃散以行民間飲散者即愈所活亦萬計也列仙傳下云昌容者常山上道士也自稱殷王女食蓬蔂根往往人見之者二百餘年而顔色如年二十人能致紫草賣與染家得錢以遺孤寡歷世而然奉祠者萬家云云神仙傳第三云沈羲者吳郡人也學道於蜀中但能消災治病救濟百姓也第四云黃廬子者姓葛名越其治病千里寄名與之皆愈不必見病人身也第五卷云沈建者丹陽人也善能治病病無輕重見建者皆愈也第八云王遙字伯遼鄱陽人也頗行治病病無不愈亦不祭祀不用符水針藥其行治病但以一八尺布帕敷地坐不飲不食須臾病愈便去其有邪魅作禍者遙但書地作獄囚口召呼之皆見其形在獄中或狐貍鼉蛇乃斬而焚燒之病者尋愈也第九云李常在者蜀郡人也護病困者三日愈微者一日愈其不可愈者則不往護之又云干君者北海人也病癩數十年百藥不能愈見市中一賣藥公姓帛名和往問之公言卿病可護卿審欲得愈者明日雞鳴時來會大橋北木蘭樹下當教卿明日雞鳴干君往到期處而帛公已先在焉怒曰不欲愈病耶而後至何也更期明日夜半時於是干君日入時便到期處須臾公來干君曰不當如此耶乃以素書二卷授干君誡之曰卿得此書不但愈病而已當得長生干君再拜受書公又曰卿歸更寫此書使成百五十卷干君思得其意內以治身養性外以消災救病無不差愈在民間三百餘年道成仙去也登真隱訣云南極南嶽真人左仙公太虛上真君姓赤諱中英初學道在金華山忽得疾病困篤經一十六年青童授智慧消魔經扶疾諷誦三千遍都愈也道學傳第七云陸修靜字元德吳興東遷人也宋大始七年四月明帝不豫先生率衆建三元露齋為國祈請至二十日雲陰風急輕雨灑塵二更再唱堂前忽有黃氣狀如寶蓋從下而升高十丈許彌覆階墀數刻之頃備成五色映曖簷榥徘徊良久忽復回轉至經臺上散漫乃歇預觀齋者百有餘人莫不皆見事奏天子疾瘳以為嘉祥又云孟景翼字輔明平昌安丘人也梁竟陵王遇靈寶經一部看便以擲地少日便手發疽瘡痛楚特甚遂遣馮先生首謝先生為作悔辭備加慊疑雖蒙少差終為此疾而亡也第十八卷云婁安樂譙國人也妻傅氏患風瘡十餘年治之百方不差唯專道門願得濟免宋元嘉七年六月天暴風雨安樂兄屋崩倒傅懼己室方壞將致頽壓忽走出中庭忘己腳疾於是復常由其信法故也豈醫藥之足賴哉玄母八門經云仙人趙成子服五石石發死幽州上谷玄之山六年間忽有一人山行見此死尸腹爛石出採而吞之别去四五年此石飛出還入前日死尸之口尸起成人面生玉光此盜石人被五老仙公切齒訶之此盜五藏寶石之人也此癩面人也即面上生癩比至一門大小遭癩俱死滅族之也神祝經第一云青氣者卒死赤氣者腫病黃氣者下痢白氣者霍亂黑氣者官事赤頭鬼持此氣布行天下殺其惡人也登真隱訣云崔文字列仙傳云太山人在太山下以藥救病人者赤君在金華山病十六年後風消得道也真誥第五云風消得道真誥第五云風病之所生生於丘墳陰濕三泉壅滯是故地官以水氣相激多作風痺風痺之重者舉體不授輕者半身或失手足也若常夢在東北及西北經接故居或見靈牀處所者正欲與冢氣相接也墓之東北微絶命西北為九危此皆冢訟之凶地若見亡者於其間蓋其驗也若每遇此夢者卧覺當正向上三啄齒而祝之曰太元上玄九都紫天理魂護命高素真人我受上法受教泰玄長生久視身飛體仙冢墓永安鬼訟塞姦魂魄和悅惡氣不煙遊魅罔象敢干我神北帝打制收氣入淵得録上皇謹奏玉晨如此者再祝祝又三叩齒則不復夢冢墓及家死鬼若經常得惡夢不祥者皆可按此法於是鬼氣滅也邪魅散形也又云手臂不授者沈風毒氣在脈中結附痺骨使人然也宜針灸針灸則愈又宜接北帝曲折之祝若行之百過疾亦消除也先以一手徐徐按摩疾臂良久畢乃臨目內視咽唾三過叩齒三通正心微祝曰太上四玄五華六庭三魂七魄天關地精神府營衛天胎上明四肢百神九節萬靈受籙玉晨刊書玉城玉女侍身玉童護命永齊二景飛仙上清長與日月年俱後傾超騰升仙得整太平流風結痾注鬼五飛魍魎冢氣陰氣相徊凌我四肢干我盛衰太上天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰收摧如有于試干明上威昔唐覽者居林慮山中為鬼所擊舉身不授似如綿囊有道人教按此法皆即除也此北帝曲折之法諸疾有曲折者用此法皆佳不但風痺不授而已也唐覽今在華山得虹丹法合服得不死鄭子真則康成之孫也今在陽翟山昔初學時正患兩腳不授積年其晚用針灸兼行曲折祝法百日都除夫風考之行也皆因衰氣之間隙也體有虧縮故病來侵之也若今差愈誠能省周旋之役者必風痾除也今當為攝制冢注之氣亦可上冢訟章我當為關奏之也於是注氣絶矣昔鄧雲山停當得道頓兩手不授吾使人語之令灸風徊曲津兩處也六七日間便得作五禽按摩也若針力訖當語所灸處又心存行道亦與身行之無異也昔趙公成兩腳曳不能起旦夕常心存拜太上如此三十年太上真人賜公成流明檀桓散一劑即能起行後遂得道今在鶴鳴山下又云夜卧覺存日象在疾手中握之使日光赤芒從臂中逆至肘腋間良久日芒忽變成火以燒臂使內外通匝洞徹良久畢乃陰祝曰四明上元日月氣分流光焕曜灌液凝魂神火散景蕩穢鍊煙洞徹風氣百邪燒燔使得長生四肢完全注害考鬼收付北辰夫學生之道當先治病不使體有虛邪及血少腦減津液穢滯也不先治病雖服食行氣無益於身昔有道士王仲南者少乃有意好事神仙恆吸引二景餐霞法四十餘年都不覺益其子亦服之足一十八年白日升天後南嶽真人忽降仲甫而教之云子所以不得升度者以子身有大病腦宫虧減筋液不注靈津未溢雖復接真景以餐霞故未為身益仲甫遂因藥治病兼修其事又一十八年亦白日升天今在玄洲受書為中嶽真人領九玄之司于今在也鳳綱口訣云道士有疾閉目內視心使生火以燒身身盡存之使精如髣佛疾病即愈是痛存其火也甚祕驗矣真誥第七云李整昔未入山時亦得風痺病久久乃愈也又云范伯慈者桂陽人也家本事俗而忽得狂邪勞病卧牀席經年迎師解事費用家資漸盡病故不愈聞大道清約無所用於是意變聞沈敬作道士精進治病多驗乃棄家俗事之得五十日病都愈後入天目山服食胡麻得為玄一真人也真誥第八云昔鮑助者濟北人也忽得回風口目不正風氣入口而兩齒上下恆相切拍甚有聲響如此晝夜不止得壽百二十七歲真誥第九云楊羲第三女昨來委瘵近來小可猶未出外也又云許玉斧言楊舍人弟病委頓也真誥第十云許確字羲玄為晉都鄉侯後患風不能言隆安二年亡年七十道學傳第四云屬大疫癘競造吳猛乞水猛患其煩乃纂江水方百步隨意取之病者得水皆愈也又云道士舒道雲病瘧三年治不差吳猛授以三皇詩使諷之上口所疾頓愈也第三云戴甘露有惡疾流諸海裔云名正見曰可治也為治數日便愈又云治中抗侯大富女病經年千醫百道靡不畢祈增而不損云名正詣門云能使女差抗侯傲然未之接也凡諸言術而不驗者既多又見正之弊衣徒跣意以為狂而弗信正狀謂能治固疾請女出侯大怒且女病積久無能出理女忽問家人誰欲見我便著衣履整飾而出侯大驚正曰女郎已差便可還內於是舉家始服其神驗也第四卷云任敦字尚能治病人有極惡之病人理所棄者得敦救治莫不蒙濟如此有數少語言或時説將來吉凶咸如所言人有病問之者答云無所苦必不危亡默而不言則皆不救又云杜炅字子恭為人善治病人間善惡皆能預睹上虞龍稚錢唐斯神並為巫覡嫉炅道玉常相誘毁人以告炅炅曰非毁正法尋招冥考俄而稚妻暴卒神抱隱疾並思過歸誠炅為解謝應時皆愈神晚更病炅語曰汝藏鬼物故氣祟耳神即首謝曰實藏好衣一箱登取於治燒之豁然都差又云王羲之有疾請杜炅炅謂弟子曰王右軍病不差何用吾為十餘日而卒又云陸納為尚書令時年四十患瘡告炅云奕世短壽臨終皆患此瘡炅為奏章又與靈飛散謂曰君厄命已過可至七十果如其言也第五卷云安丘望之字仲都成帝時京兆長陵人也病篤弟子云沙都輿安丘於庭樹下安丘曉然有痊時冬月鼻聞李香開目則見雙赤李著枯枝都仰手承李李自墮掌中安丘食李所苦盡除身輕目明遂隨都去莫知何在也又云郭文字文舉河內人也得疫病厄困不服藥云命不在於藥也不食二十餘日亦不消瘦後卒殯于餘杭臨安縣又云劉凝之字志安小名長年南郡枝江人也少抱尪病風眩迷謬纍載彌增也第七卷云陸修靜字元德宋時吳興東遷人也隱雲夢山修道暫下尋藥進過故鄉停家數日女忽暴病命在晷刻家人固請救治先生歎曰我本委絶妻子託身玄極今之過家事同逆旅豈復有愛著之心於是拂衣而出直逝不顧去後一日女病即愈也又云修靜素有氣疾齎藥入山别處一室俄而為火所燔弟子欲撲滅之先生曰不須救此是冥道不許吾持藥耳吾病行當自差少日而瘳也第八卷云顧歡字玄平一字景怡吳郡吳人也白山村多邪病村人告訴求哀歡往村中為講老子纂地獄有頃見狐貍黿鼉自入獄中者甚衆疾者皆愈也第十卷云方謙之字道沖冀州趙郡柏縣人也弱齡斷酒終老手不執杯雖有疾病不服湯藥未嘗針灸任命安危外身濟物也又云張玄徹字文舉義陽郡人也與鄉人張貴孫講説貴孫忽感風病不能起居屏棄學事躬自料理出入穢器瞻視飲食涉於三年不以為纍時人服其義烈也第十二卷云賈稜字玄邈蜀郡成都人也少為沙門值寇還俗晚來服道與諸道士丞相是非暮年抱疾脣齒不斂言語謇妨於妙門法座歎曰我今此病必由觸道所招所撰諸義多有遺亡也第十五卷云桓闓字彥舒東海丹徒人也梁初崑崙山渚平沙中有三古漆笥內有黃素寫干君所出太平經三部村人驚異廣於經所起靜供養闓因就村人求分一部還都供養先呈陶君陶君云此真干君古本闓將經至都便苦勞瘧諸治不愈陶貞白聞云此病非餘恐取經為咎何不送經還本處即依旨送病乃得差耳第十六卷云孔靈産字靈産會稽山陰人也遭母憂居喪以孝聞宴酌珍羞自此而絶饘蔬布素志畢終身父在京師未之知也後出都定省見有毁瘠父惻然命厨精饌賜與同味即奉慈訓勉強進口而咽遂以成疾父以仁也天性不可移不復逼也第十九卷云齊明帝有疾每引法衆於內殿行道聞晉陵道士嚴智明字慧識在衆中詠經甚懷賞悅云疾為之愈及法席既解智明還外帝夜中每處不得安寢勑呼智明對御轉誦即覺歡怡降長勑給傳詔車牛出則施道俗榮之也第二十卷云梁元帝世子方等疾篤徐妃攝心潔己遣人到女官李令稱華林館作功德妃夜夢見二青衣童子容服異凡稱華林侍童被使相告疾者為取觀壇石宜送乃痊覺即問世子世子云近造山池取用遣送還并遣侍讀王孝祀入山更建齋懺謝世子即愈之也神仙傳第四云人有疾病者就河東人孫博自治博亦無所云為直指之言愈即愈也第七云董奉字君異候官人也吳先主時還豫章廬山下居有一人少便病癩垂死自載詣奉叩頭求乞哀憐奉使此人坐一户中以五重布幕病者目使莫動乃勑家人莫近之病人自説聞有一物往舐之痛不可堪無處不匝度此物舌當大一尺許其氣息當大如牛許竟不知是何等物良久物去奉乃往解病人巾以水與浴之遣去告曰如是愈矣且勿當風十數日間也病者身體通赤無復皮甚痛得水浴即不復痛二十日皮生瘡盡愈膚如凝脂也又云奉居山間了不佃作為人治病亦不取錢物使人重病愈者為我栽杏五株輕病愈者為我栽一株如此數年之中杏有十數萬株鬱然成林云云第九云桂君者徐州刺史也病癩十年醫所不能治聞干君有道乃往見之道從數百人威儀赫奕至門干君不迎入室干君不起桂君拜而自陳干君問子來何為桂君曰無狀抱此篤疾從神人乞愈耳干君曰子侍從乃衆吾謂子欲求劫道子若信治病者皆遣侍從身留養馬可得愈也桂君即去從官方留養馬三年亦不見治病不知病愈也又云茅君學道於齊後成道治於茅山人有疾病往請願當煮雞子十枚內帳中須臾茅君一一擲子還之歸破之皆無中黃者病人當愈若中有土者病即不愈以為常候雞子如故無開處也第十云封君達者隴西人也聞有疾病待死者識與不識便遇之以藥治之應手皆愈也又云趙瞿字子榮上黨人也得癩病瘡垂死人或告其家云當及生棄之若使死於家則世世子孫當以此病相注於是家人為作一年糧送著深山石室中又恐虎狼食之從外以木柴柴之瞿悲傷自怨晝夜涕泣如此百餘日夜忽見石室前有三人問瞿何人瞿應曰是窮人也瞿知深山窮林之中非人所行必是神靈乃自陳説叩頭求哀神人入行諸木柴中有如雲氣了不罣礙問瞿必欲愈病者當服藥能不瞿曰無狀多惡瞿此惡疾已見疏棄死在旦夕若刖足割鼻而可得活者猶所甘心况於服藥豈有不能也惟乞神人丐其生活神人乃以松子松脂各五斗賜之語曰服此不但愈病而已當得度世汝服此盡此病當得愈愈而廢之瞿服之未盡癩病了愈身體強健乃歸家家人謂之鬼具説之家乃喜遂服之二年顔色轉少肌膚光澤走及飛鳥也又云陳長者在紵藇上已六百歲紵藇上人為架屋每四時享祭之長亦不飲食無所修為諸事奉者疾病則已以器從長乞祭水服之皆愈其命當死者長則不與水也藇音歟太平經第三十三云真人問曰凡人何故數有病乎神人答曰故肝神去出遊不時還目無明也心神去不在其脣青白也肺神去不在其鼻不通也腎神去不在其耳聾也脾神去不在令人口不知甘也頭神去不在令人眴冥也腹神去不在令人腹中央甚不調無所能化也四肢神去令人不能自移也夫神精其性常居空間之處不居污濁之處也欲思還神皆當齋戒懸象香室中百病消亡不齋不戒精神不肯還反人也皆上天共訴人也所以人病積多死者不絶太平經第四十五卷又云今天不惡人有廬室也乃惡人穿鑿地太深皆為創傷或得地骨或得地血者泉是地之血也石為地之骨也地是人之母妄鑿其母母既病愁苦所以人固多病不壽也凡鑿地動土入地不過三尺為法一尺者陽所照氣屬天也二尺者物所生氣屬中和也三尺者及地身氣屬陰過此而下者傷地形皆為凶也古者依山谷巖穴不興梁柱所以其人少病也後世賊土過多故多病也又云有問者曰今時有近流水而居不鑿井何故多病不壽何也答曰如此者是明天地既怒及其北伍更相承負比如一家有過及其兄弟也是知穿地皆下得水水乃地之血脈寧不病乎又云有問者曰今人或有不動土有所立便旦時有就故舍自若有凶何也答曰如是者行動不利犯神凶也問曰犯何神也答曰神者非一不可務名也又云有問者曰今有起土反吉無病害者何也答曰皆有害但得良善地者不即病害人也久久會且害人也若得惡地即病害人也故大起土有大凶惡小起土有小凶惡是即地忿使神靈以此之災多病人也又云有問者曰今河海下田作室廬或無柱梁入地未三尺輒得水復當云何也答曰此同為害也宜復淺之者地之薄皮也近地經脈也若人有厚皮難得血血出亦為傷也薄皮者易得血血出亦為傷也夫傷人者不復道其皮厚與薄也見血為罪也人不欲見傷傷之則怒地何獨欲樂見傷之哉夫天地乃人之真本陰陽之父母也而子何從當得傷其父母乎又云有問者曰今子當得飲食於母故人穿井而飲之有何過乎答曰不爾今人飲其母乃就其出泉之處也故人乳者人之泉也若地有水泉也可飲人也今豈可無故穿鑿母皮膚而飲其血汁耶太真科上云篤病救命名為義齋三日夜高德一人為齋主五人為從官精誠好樂籙生亦可從齋非好樂進德不得從齋也又云救解父母師君同道大災病厄齋官露壇大謝闌格散髮泥額禮三十二天齋中奏子午章苦到必感依旨教塗炭齋法也齋悉門中然七燈祖延光明又五燈井竈門閣各一致聰明福也又云法師宣法衆官精苦行禮得節儀序不虧病人受恩漸蒙差愈三日齋心尅有效者賜師算三十從官小算二十齋日計倍為率也三洞珠囊卷之一
