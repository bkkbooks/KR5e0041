front:
  text: 三洞珠囊卷之六懷六
  hash: sha256:d6ff07c550e37331d6c650542725253d529de7cc2947d65636c4e560769d6380
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_HFL_006-001a, image: hfl/0781/0781-048.png}
body:
  text: 大唐陸海羽客王懸河修齊會品太玄經第八老子傳授經戒注訣云夫欲傳授道德而對齊者法限三十八人少不可减六人六人為通齊官備足一人為師五人為保保者寶也荷也明也證也度也成也相重如寶任荷可教明其丹誠證其業善度其試難成其至真齊法九日七日五日三日勿减一日若减一日者此是會而非齊散財飯賢謂之為會文書啓告請監會宫也故玄都三會律云四月八日會天徒皆設謪食也注云出天徒皆風毁小贖徒人之罪也前三十八人者一曰三師其一人為正師二人為護師即法師是也二曰五保五人即都講是也三曰六明六人即監齊是也四曰七證七人即侍經是也五曰八度八人即侍香是也六曰九成九人即侍燈是也右六品三十八人不能備者多少隨緣皆為神足弟子俊彥英才之人作五保七證之師同為署受法之辭以修齊然後授其戒録也三元經中卷云正月十五日天官七月十五日地官十月十五日水官此三官上會玉京山校定生死罪福簿録也此日皆須齊會也捨失戒品太真科下云凡受道經科律戒籙因緣應捨許得捨之不可委叛叛不告而去後難以還捨而去後後必易歸歸乎至道無復去今應去者輸誠告師師設譬諫為立方宜方宜不立諫必不從為之燒香啓告三寶教之三禮心口發言經戒科律與某身俱空三界六趣與大道俱空諸法空一切空三言之訖三禮而去後適意隨願而行猶不得誹謗正法弊露祕言犯之長墮地獄無復入善之期嚴加宣明去後反悔重求受科先立功德效力輸財然後依法受之如初也太真科下卷云凡是受戒籙忽然失去失去輸一半不須重受之也正一法文下卷云失籙者更令罰薪五束朱三兩飯賢三人失一將軍罰薪半束朱四兩飯賢五人失十將軍罰薪一束朱五兩飯賢十人失七十五將軍罰薪十束朱七兩飯賢五十人失百五十將軍罰薪三十束朱九兩飯賢百人凡輸罰畢得重受也又云非意失去某年月日時於家或在某處遭公私逼迫水火盜賊依實言之不知所佩之籙何在尋檢不得依自謫輸薪厨以贖罪更令得受不勝元元也清戒品太玄部卷第八老子傳授經戒儀注訣云凡受戒及經畢後月晦月半不可不齊齊則清戒溫戒竟夜誦之百遍千遍限外無數永堪如此者不可减九遍他日齊靜行來出入得誦便誦不必齊時咨師訪友思而行之不須高聲心口相知在人衆中勿發於口審能在心然感通上聖也正一法文下卷云凡為道民便受護身符及三戒進受五戒八戒然後受籙受籙之前未受戒者受籙之後依次受之誦習通利恆存思行諳憶不謬忘則犯科未受籙時無所呼召受籙之後動靜呼神不行戒者呼之不至破戒之人吏兵遠身還上天曹考官便逮致諸厄疾公私灾橫轗軻衰否所作不成成功立德捨暗入明施善禳惡以吉除凶要在行戒神即祐之戒有别文精詳修習或有不解或有遺亡或有謬誤或冒禁故或尊上逼迫或畏死犯之皆是愆招悉名破戒即應懺悔首謝自新也凡違戒者背負鞫言協道信邪雜事佛俗此為不專中心懷二愚迷猶豫或障纏深師三誨之必能改革守一不回召神有效三誨不悛是為叛道乖逆師尊法應奪録入佛奉俗及無所事師慈改之不追咎責怨懟事他棄本逐末雖名奉道實犯正科諸官不得容受積久知悔更立功乞還聽許依德升遷矣亦别有清戒籙醮儀一卷以行世用之立功禁忌品太玄都中宫女青律云凡修上清之法不得北向及本命之上二處便回觸忤玉晨穢慢本真五犯不得入仙也十犯被考左官死入地獄三塗之中萬劫還生不人之道也又云凡上學之士受三天正法四明之科佩帶真文出入三光及冥卧息不得露頭不著巾帽及脫衣露形毁慢身神恥辱真文令真靈遠逝空尸獨在三犯不得入仙也五犯死入地獄萬劫還生不人之道也又云凡上學之士受三天正法四極明科不得妄入淹穢哭泣悲淚吊問死喪五犯伐功斷事不得入仙也十犯死入地獄萬劫還生不人之道也太上黃素四十四方經云凡道士存思上法及修學太一事皆禁見死尸血穢之物當以真朱一銖散內水中因以洗目漱口并洗手足微祝曰三光上道太一護形司命公子五神黃寧血尸散滅凶穢沈零七液纏注五藏華生令我仙度長享利貞凡道士受學生法不得稱死稱死事者則生氣變動不居常宅故死氣運入魂神離棄是以惡氣遊尸陳其間孔矣將病將死之漸也真一條檢經云夫立功德者不得觸禁犯忌當與身神相和不可更相尅賊更相尅賊生灾起禍也夫消灾散禍不得用本命行年本命行年賊害汝身本命日可行周天大度鍊氣生身不可妄失行年日可行生布氣養神育精不可妄失絶命日不可用用之致灾絶滅歲星日不可用用之致縣官刑獄六害日不可用用之致疾病衰厄月晦日不可用用之致灾身枯氣喪歲破日不可用用之致灾家門凶禍戊辰戊戌日不可用戌為天門辰為地户戌將是狗辰將是龍戌是中王神也其日太上丈人詣太上老君對校天下男女應生者注玉曆九老丈人詣九老君對校天下男女應死者注死籍道德丈人詣道德君對校天下男女為功德者記名左契天帝丈人詣天帝君對校天下男女為罪過者著名右契仙都丈人詣仙都君對校天下男女應得仙者上名仙籙天師還天曹校梀初角反簿録分别善惡此日閉天門塞地户龍遊五嶽狗行河梁中黃犬神備守天門中黃丈人備守地户外事一斷其日不得燒香行道關啓章奏汝曹妄有觸耗此日者中黃大神收攝汝曹魂魄付候獄栲掠六十日關啓章奏不得通聞六十日考竟遣魂魄還汝曹身中令汝曹轗軻衰耗亡失疾病口舌皆由於此若戊戌日卒有疾病縣官者當正心端坐思過悔請吾自懸知汝心自為汝曹寬停考罰明日汝曹有文書陳乞即下赦恕之書汝曹也又云受太一法在身者遭父母喪經三月日期喪滿月大功喪經月可得奉行道法章書啓乞也受天真三一真一赤界法在身者遭父母喪經百日也期喪三十日大功喪經月月限未滿不得奉行道法章書啓乞也受黃書契令在身者遭父母喪一年也期喪百日大功喪四十日小功喪滿月緦麻經月月限未滿不得奉行道法章書啓告也若違犯落平陰獄獄中恆有泥塗滑不可走被考使走行塗中不得一步便自倒地如此三百年考竟更生為人短悴衆人所輕也真誥第九云正月庚申二月辛酉三月庚戌四月癸亥五月壬子六月癸丑七月甲寅八月乙卯九月甲辰十月丁巳十一月丙午十二月丁未右上帝殺日不可請乞百事無宜金書仙志云夫學仙之人勿北向便回仰視三光勿北向理髮解脫衣裳勿北向唾罵犯破毁王破謂歲下辰也王謂王氣之所在也勿怒日月星辰勿以八節日行威刑勿以月朔日怒恚勿以三月三日食百草心勿以四月八日殺草伐樹勿以五月五日見血勿以六月六日起土勿以七月七日思存惡事勿以八月四日市履屐附足之物勿以九月九日起牀席勿以十月五日罰責人也勿以十一月十一日不沐浴勿以十二月三日不齊燒香念仙也諸如此忌天人大禁三官告察以是為重罪矣或令人三魂七魄流競或胎神所憎三官受惡之時也是以惡夢交於丹心妖魅乘其朱闕精夜觸犯神真煩惱流變多禁莫識奇術子能奉修則為仙才不奉天禁則為傷敗黃順請問上經云受老子經不奉混俗祠祀又云受法之身常出入行來經履新生及新死之家及行逢死尸與棺木者還所住處香湯沐浴方得燒香也又云受法之身不入産婦之户及不得見尸者謂異處斷隔於來往則乃朝禮無廢不拘日數之限若家無隔異者四十五日方得朝禮也正一法文下卷云協道信邪此為不專中心懷二愚迷猶豫是為叛道乖逆師尊法應奪算太上黃素四十四方經云凡修太一之事及行上法存神之道慎不可見尸及血穢之物見一死尸則一年不得行事又却傾一年之功然此帝一之科常却罰於既往又進塞於將來若一年三見尸者則罰功斷事各三年也若過見二十四尸者皆不得復修行太一以求仙也又云凡修受上法及雌一太一之事者兆身中三魂五神之氣常薰於巾服之中七魄九靈之精常棲於履屐之下是以道士學生不雜席而寢故衣褐之服不借非己之器履屐之物常惡土穢之糞亦不得使雜人犯觸以驚三魂也又云凡存修太一之事欲有所禮願慎不可叩頭叩頭者則傾九天動干真神官回覆泥丸倒懸天帝號於土府太一泣於中田數如此者則存念無益三真棄宫七神埋散玄宅納凶是為太一五神之至忌也故有真之人但心存叩頭運精感而行事不因類以祈靈也又云凡修行太一之事真人之道不得有所禮拜禮拜亦帝君五神之所忌也若有所精思行禮願之時但心拜而已不形屈也上清大洞戒九十二條科云修雌一之法不得哀哭哀哭感則五神號於上府太一泣於中田神喪精亡靈真去身空尸獨立復何仙冀哉又云不得見尸一年不得行事却傾一年之功若一年見三尸者則三年不得行事亦却三年之功滿見二十四尸子失道前文太素亦與此大同小異矣又云不得言稱死事恚怒願己之死也言滿四十不得為真人以為棄生之罪三年身亡滅矣又云不得五色衣裳敷華好服則真靈去身淫邪內發馳心猖狂三尸潜逸赤子飛飈長離玄室破形解骸身死名滅若衣勿雜色蘭布之服可以終日詠誦洞章奚求不得乘雲駕龍逍遙太極也靈寶戒三十六條仙內科云玄功之人當布衣草履不得榮華之服犯者失道也又云不得言及俗邪穢之事三犯失道又云祖父母己父母同法可拜不同不得拜伯叔以下同法亦不得拜犯者身亡也又云父母吉會不得預坐也又云父母兄弟妻子同契雖有骨血之功皆不得同牀而坐同盤而食其法不同皆為尸穢犯者失道又云夫妻不得同室而寢邪念在心長失道矣又云自非同盟不得同室而寢自非同契不得同牀而坐同盤而食同衣而服也靈寶制服科云祖父母期年之喪不得臨尸於别房制哀五日不得受弔伯叔兄弟同如祖父母九月服又云制哀畢沐浴復巾服不得制世服犯者失道罪劇上科若己父母聽展哀百日後復巾褐心喪三年無復哀喪此靈寶聞科也若隱身名山無復哀哭也一自都斷矣玄都立身行道律第十五云身荷仙官靈籙不得妄拜哀不得妄哭也又云於父母國君官長二千石刺史三公皆設敬不得即設禮拜也又入治律第二十云臨喪不踰月不入治哭不過三日不入治穢汙不過晦朔不入治三年不滿百日不入治皆謂哀戚犯穢罪不敢觸神明也戊辰戊戌不入治禁忌之日不得入治請吏兵丙寅丁卯丙申丁酉戊申戊戌皆不入治行道修真犯禁忌皆奪算减年也破可以消灾建可以立功刑害之日不用注云不得用自刑殺害之日也若上章不得用建破閉也上章律第十三云寅刑巳戌刑未子刑卯申刑寅卯刑子巳刑申丑刑戌未刑丑第二十律又云不得齊持酒肉於治中飲食濁亂太素罰素四十五注云小穢三日大穢七日聽得解之也緣何今按三洞科起靖觀宫堂第十一云民家曰靖師家曰治又引律曰按靖立在天德天德甲乙丙丁地也長一丈八尺廣一丈六尺凡佩仙符籙皆須安靖治也第二十律又云不得犯三師諱三師四世諱違律罰算七入治時亦不得犯注云天師係師也户籍所屬師曾祖祖父師身四世名諱也受持八戒齊品具銜臣陸修靖上啓元始天尊無極大道感應靈聖一切神明今有善男子善女人等求欲受持八戒清齊一日一夜用以檢御身心滅諸三業罪惱者故洞神經第十二云夫齊以齊整為急以齊整身心身心齊整保無亂敗敗起多端大略有八也一者不殺生以自活二者不得淫欲以為悅三者不得盜他以自供四者不得妄語以為能五者不得醉酒以恣意六者不得雜卧高廣大牀七者不得競習香油以華飾八者不得耽著歌舞以作倡今日善男子善女人等若能不犯此之八事則八敗無從以起則八戒自然而立立久不失則延年保命神通洞達是故齊者受持八戒思真行道通而無窮顯驗必速皆如所期也今請受既畢再拜再起奉戒而退也三洞珠囊卷之六
