front:
  text: 三洞珠囊卷之四懷四
  hash: sha256:a5b642d4fc2a6306883601afb6745be35ccee9d6a240af1e233a6eaa104c21f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_SJB_004-250318a, image: sjb/25/250318a.png}
body:
  text: 大唐陸海羽客王懸河修絕粒品道學傳第六云褚伯玉字元璩吴郡錢塘人也隱霍山鍊液餐霞積年絶粒也吐納經云絶穀不食元神之道也初服氣一日二日之時穀氣未定顔色鬱黄三日之時穀氣去精氣來四日五日之時精氣陰陽和調六日之時精神安定耳目聰明行步便利日已堅彊七日之時常欲輕舉至道之故夢寤髣髴上通神明八日之時神行八極能默然每爲口中自甘志骨自彊九日之時精神備形弱者彊神氣日堅固不行自遠不來自近顔色日悅十日之時諸神來至門皆關玉女侍從左右輕舉若鷰雲中微翔道以得矣又云道以精爲寶施與則生人人留則生身生身則永度世仙位也生人即功遂而身退隱也俗以爲劇何况忘施而廢棄損不學多故廢老而命墜也老君曰精者血脉之川流也精去則枯老是以寶之也人以身爲國神爲君精爲臣氣爲民常行愛精此要道也老君曰道者氣也寶氣則得道得道則長久神者精也寶精則神明神明則長生也又云長生道精爲寶精者人之所由生也精爲寶故曰道也一日之道朝飽暮饑一月之道不失盛衰一歲之道夏瘦冬肥百歲之道節穀食棗千歲之道孤男無女是謂長生久視莫有能數也今謂此已上之文並出道基吐納經又云蓋聞八公有言食草者力食肉者勇食穀者智食氣者神聖人不食者不死也又黄庭經云仙人道士服氣非有神也積精所致和氣專也人皆食穀與五味我獨食太和陰陽氣故能不死也則休粮食氣爲生道陰陽還精爲重寶幸可修身至壽考空但慕遠謂無有更反於愚自使老千金送葬無益兆悲悼哭泣自懊惱不如長生最爲好故記道幾言約少筆墮有眞不妄修造之不釋昇太昊太平經第一百二十云是故食者命有期不食者與神謀食氣者神明達不飲不食與天地相卒也第一百四十五云問曰上中下得道度世者何食之乎答曰上第一者食風氣第二者食藥味第三者少食裁通其腸胃又云天之遠而無方不食風氣安能疾行周流天之道哉又當與神吏通功共爲朋故食風氣也其次當與地精并力和五土高下山川縁山入水與地更相通共食功不可食穀故飲水而行也次節食爲道未成固象凡人裁小别耳故少食以通腸亦其成道之人次道基經云服藥食麥爲善昔有甘始道士禦氣食麥而度世也又云合道不言得無之眞晝夜不卧日月合光不饑不渴龜龍胎息也又云食穀名之穀仙行之不休則可延久長也不食穀者可以昇雲度世不死之矣又清虚眞人王君内傳云太極眞人曰夫受生氣於五穀者結胎育物必抱穀氣之流精也合眞萬化亦陶五穀之玄潤也若子寄形於父母將因所生而攝其生矣不縁所生之始本而頓廢其所因者未曾不枯竭於偏見斷年命以凋傷乎皆宜因其所由順其津源凝滌而和微而散根使營衛易鍊於日用六府化穀於毫漸矣故因穀者乃用生之良術縁本以去本者乃攝明之妙跡耶於是扇南燭之東暉招始牙之朱靈五液夷泯百關通盈神樂三宫魂柔魄寧復勵以晨漱華泉五方虚精鳴鼓玉池呼吸玄精華腴童於䂓方胃滿鎮乎空青所以千筭一啓壽隨年榮歲與藥進飛步仙庭也服盡一劑者命不復傾五雲生身體神氣精亦能一日九食百關流渟亦能終歲不饑還老反嬰遇食則食不食則平眞上仙之妙方斷穀之奇靈也向云南燭者仙草也其樹是木而似草故號南燭草木也一名猴藥一名男續一名後卓一名惟那木一名草木之王生嵩高少室抱犢鷄頭山已録服食品訖此方亦出登眞隱訣第十也前服食亦說與此大同小異也道基道士吐納經云絶穀斷稻米及餌清物者不得飲酒令人迷惑氣脉煩結百脉不通又生熱不如不飲可爲清潔也太上黄素四十四方經云凡道士納和氣存神服霞修求長生之事慎不可食五葷之菜及爲酒色之病敗也是故古之神人云五葷爲伐藏之斧斤酒色爲喪身之棺槨夫能斷斧斤之所傷塞棺槨之死宅然後可以陟長生之塗逕漸神仙之蹊路也无量變生經云食肉及五辛神不居人身中也金書眞記云食五辛敗仙相也五辛者葱蒜韭薤興渠今俗間不詳之神丹仙藥名品又第九卷服食品第二十九隱山品並有仙藥名太上八景四蘂紫漿五珠絳生神丹玉經云第一絳陵朱兒口訣云是丹砂巴越之精上者第二丹山日魂口訣云是雄黄取洞明者第三玄臺丹華口訣云是雌黄第四青要玉女口訣云是空青第五靈華液腴口訣云是薰陸香第六北帝玄珠口訣云是消石第七紫陵文侯口訣云是紫石英第八東華童子口訣云是青木香第九白素飛龍口訣云是白石英第十明玉神朱口訣云是眞瑰拾芥者第十一五精金羊口訣云是陽起石第十二雲華飛英口訣云是雲母光明白者第十三流丹日膏口訣云是胡粉第十四亭炅獨生口訣云是鷄舌香味辛者第十五碧陵文侯口訣云是石黛第十六倒行神骨口訣云是戎鹽第十七白虎脫齒口訣云是金牙石第十八九靈黄童口訣云是石硫黄第十九陸虚遺生口訣云龍骨舐之附舌者佳也第二十威文中王口訣云是虎腦第二十一沈明合景口訣云是蚌中珠子第二十二章陽羽玄口訣云是白附子第二十三緑伏石母口訣云是磁石第二十四中山盈脂口訣云是太一餘粮取中央黄者二十四種合爲八景四蘂五珠絳生神丹也此丹服一兩即頭生九晨之光面有玉華飛映寶曜洞觀天下造詣紫虚出入玉清寢宴晨房也太一餌瑰葩雲屑神仙上方云夫茂實者翹春之明珠也巨勝者朗秋之沈靈也丹棗者盛陽之雲芝也茯苓者絳晨之伏胎也五華合煙三氣陶精調安六氣養魂護神能得其方位爲天仙老素反玄嬰胎童顔千害不傷延壽萬年又云玄水雲華漿法亦曰雲茂朱漿日服五合使人體香而面有童華神仙方也又云太一四鎮丸者神生五藏鎮六骨養七竅和九關鍊三魂明二童保一身長生萬歲也又云三神龍骨益六液養窮腸黑髮止白太一菖蒲丸散方者守中鍊神長生久視填凝骨髓補滿腦血久服紫色如少女之形一名九轉始精菖蒲一名昌陽芝草已上並出上清九眞中經内訣以爲主也大洞眞經有九轉霜雪琅玕華丹還白玉玄水金液流精玉林結華日月之水皆白日飛仙登天之道也又云仙母金丹一名西王母停年止老飛丹服之不死面有少容如女子紫度炎光經云飛丹紫華流精有百變之色又云玉胎瓊液之膏飛行羽經上云金精冶鍊之膏食之一口得壽七萬年洞眞太極帝君鎮生五藏上經云雲草玄清者黑巨勝腴也一名玄清卉醴英者白蜜也五光七白靈蔬者薤菜也白素飛龍者白石英也亦見九眞中經後聖道君列紀云琅玕華丹藥種物絳陵朱兒十斤口訣云是丹沙丹山日魂五斤口訣是雄黄白素飛龍一斤口訣是白石英青要玉女五兩口訣是空青紫陵文侯五兩口訣是紫石英碧城飛華五兩口訣是石黛北帝玄朱一斤口訣是消石九靈黄童五兩口訣是硫黄五精金羊五兩口訣是陽起石雲華飛英五兩口訣是雲母白虎脫齒五兩口訣是金牙石流丹白膏一斤口訣是胡粉倒行神骨五兩口訣是戎鹽玄臺月華五兩口訣是雌黄都合十四種華丹若成一兩爲一仙白華者一名章拒一名章明一名章生一名章草一名章陸一名通神一名通精一名通靈一名王女一名家仙一名家寶一名家芝一名延命一名長生草一名守宫一名守宅十二部一名夜呼一名夜鳴一名致精一名陽明一名陰明一名赤䓪一名當陸凡二十四名上應天地二十四氣服之方寸七令人通神致福文始内傳云老子與關令東遊登日窟常陽之山掇扶桑之丹椹散若林之朱華道學傳第四云交阯出葛洪之採者第十四卷云雙襲祖字仲遠梁天監十四年自往武陵尋丹砂雜藥公私施與數十金皆以賑救窮乏也丹竈香鑪品洞神經第十四云餌丹砂焚香用香鑪匳五具也大洞眞字芝丹青玉罏鍊雲根柔金剛之經也亦出上清三天君列紀經登眞隱訣云其燒香之鑪無言其形範者古人多用博山及三足也八威召龍經有博山香鑪也太眞科上卷云崇玄臺有大香鑪高五尺恒焚香煙不絶也昇玄經第六云玉童揚奇華玉女奉香鑪第三云七寶之臺有七寶香鑪燒衆妙香馨薰無量也海空經第三云爾時海空智藏即起于席整衣帔執香鑪正對天尊恭敬而立贍視目無他顧心無他想也天文上經云日月垂光金鑪隆崇或在離門或在命宫八素眞經云仙人唯知飛丹召霜煎鍊雲朱水玉解金九鑪炎霄也道學傳第十云東鄉宗超字逸倫高密黔陬人也嘗露壇行道匳音廉中香盡自然滿溢又鑪中無火而煙氣自生氛氲周遍久之不歇也第十四卷云雙襲祖字仲遠梁時人也好讀經手不釋卷臨汝侯任郢州經塗要清使左右以香鑪匳一具置襲祖前更無所言而去第十五卷云陶貞白以三眞寶經封以錫函投諸巖穴又以眞金鵲尾香鑪隨經供養之第二十卷云女冠宋玉賢會稽山陰人也既禀女質厥志不自專年及將笄父母將歸許氏密具法服登車既至夫門時及六禮更著黄布裙褐手執鵲尾香鑪不親婦禮賓主駭愕夫家力不能曲棄放還本家遂成出家也大劫上經云天人玉女持羅天香案擎治玉之鑪燒九和之香也三洞珠囊卷之四
