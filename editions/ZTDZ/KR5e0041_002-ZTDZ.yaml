front:
  text: 三洞珠囊卷之二懷二
  hash: sha256:959db5208e895168879bbd48bc18748521dc7b18d73a426144b8b1bd50621a6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_SJB_002-250304b, image: sjb/25/250304b.png}
body:
  text: 大唐陸海羽客王懸河修貧儉品道學傳第四云范豺者巴西閬中人也或作儕字容止都雅不言先見不說機祥閑恬無欲終日默然結絡敗布以繩爲網披苫纔得蔽形冬夏徒跣脚不皴裂四時無寢𩨒音肌若處子美姿顔應接恒笑衆咸敬而安之又以宋太元十四年到荆州居于南郡枝江縣之富城洲尾巴芒中亦有屋宇不障風霜以桑柴爲牀束藁插其間有一空簞一瓦瓶裝擔枕倚以卧或有十日荷擔乞食口絶粳梁醪醴滋味果實唯麤粟飯菜羹食一升許便過旬日也行甚駛語甚急自非精意聽受略不可解恒小坐恭敬不以高卑易心不與俗中榮貴人語恒閉眼不聽聲樂恒卧而獨語人問之輒云王建武來俄又作餘端應對不可尋檢也又云生資一毫悉無簞瓶悉空也又云遥視其衣服雜色敗布帽又數十年故物殊覺不净既至甚香潔也第五卷又云劉凝之字志安小名長年南郡枝江人也王公贈遺一無所受家財事業悉分與弟姪出於蒿萊之中而爲環堵之室非力作不取也夫妻齊操能以苦節自安不拘小節常與妻共取茭車入市門隨物貴賤而賣之周食餘便以乞人雖復荒年絶粒不革其操妻梁州刺史郭詮女遣送豐華凝之悉分贍親屬以盡爲限婦亦無吝心也又云性好山水乃携妻子跨崖越嶺爲小蓬室妻子皆從不知所終也第十卷云東鄉宗超字逸倫高密黔陬人也梁廬陵威王爲起造房宇廊廡莫不華壯供養法具咸悉精奇唯先生所居茅茨不改衣服牀帷務存簡率常坐一圓枯枿移㯓遂有膝痕卉冠莞席穿缺不换也又云嚴寄之字靜處丹陽句容人也捨家入道菜食布衣體無寸帛也第十一卷云張澤字士和吴郡吴人也專心道法沈浮世也隨時語默居貧守約處之無悶也第十三卷云庾承仙字崇光穎川鄢陵人也明老莊至行清儉布衣莞席長齋蔬食四十餘年恒以講說爲務也又云孟道養字孝元外名援平昌人也爲性慈仁布衣周身蔬食充口此外蕭然執行精勤未嘗殆倦行道禮拜不避寒暑也第十五卷云戴勝字世榮晋陵曲阿人也少而出家貧盡嘗爲鄉人劉表署作表是將士好田獵勝乃棄之入茅山也第十六卷云孔靈産字靈産會稽山陰人也遭母憂讌酌珍羞自此而絶饘蔬布素志畢終身也第十八卷云鄧郁之字玄達南陽新野人也隱南嶽行則獨往居無常室寒暑唯著弊衲喪不結髮髮長則剪之齊永明時人也列仙傳上云幼伯子者冬常著單衣盛暑著檽桍形貌歲歲異後數十年更壯時人莫知也神仙傳第四云孔元者許昌人也常服茯苓松實惡衣蔬食也焦先字孝然河東太陽人也年百七十歲常食白石結草爲菴於山邊衣敗賣薪於市買故衣著冬常單衣顔色赫然休息常如暑夏飲酒之狀也韜光品大洞經下云太上大道君形沈八玄韜光萬源浩浩冥貫條條霞標神秀外覺氣彌炎洲容與大化寥寥本無太空任奇即色隨消道學傳第五云東方朔字曼蒨平原厭次人也潔其道而穢其跡清其質而濁其文若乃遠心廣度宏才麗辯倜儻博物觸類多能也又嚴君平者名遵蜀郡人也非其服弗服非其食弗食常賣卜成都市日得百錢足以自養則閉肆門下簾修道沈深不作苟見不治苟德久幽而不改其操未嘗仕年九十餘終于家第六卷云諸慧開字智遠吴興烏程人也性處幽靜常習閑寂精思内修每絶遊往或問何能幽悒如此答曰論動則六合未曠語靜則環堵有餘第八卷云陶弘景字通明魏郡平陽人也明帝時棲憩鐘嶺隱居更造樓深自潜匿也第十三卷云庾承仙字崇光潁川人也再徵爲本州主簿不出又遣就拜乃閉門幽遁使者不得前也勑追召道士品道學傳第七云陸修靜字元德吴興東遷人也隱廬山瀑布山修道宋明帝思弘道教廣求名德悅先生之風遣招引太始三年三月乃詔江州刺史王景宗以禮敦勸發遣下都先生辭之以疾頻奉詔帝未能致彌增欽佇中使相望其在必至先生乃曰主上聰明遠覽至不肖猥見採拾仰惟洪春俯深慚惕老子尚委王官以輔周室仙公替金錫佐吴朝得道高眞猶且屈己余亦何人寧可獨善乎即命弟子陳飄之出都也初至九江九江王問道佛得失同異先生答在佛爲留秦在道爲玉皇斯亦殊途一致耳王公稱善至都勑主書計林子宣旨令住後堂先生不樂權住驃騎航扈客子精舍勞問相望朝野欣屬天子乃命司徒建安王尚書令袁粲設廣讌之禮置招賢座盛延朝彦廣集時英會于莊嚴佛寺時玄言之士飛辯河注碩學沙門抗論鋒出掎角李釋競相詰難先生標理約辭解紛挫銳王公嗟抃遐邇悅服坐畢奏議於人主旬日間又請會於華林延賢之館帝親臨幸王公畢集先生鹿巾謁帝而昇天子肅然增敬躬自問道諮求宗極先生標闡玄門敷釋流統並詣希微莫非妙範帝心悅焉王公又問都不聞道家說二世先生答經云吾不知誰之子象帝之先既已有先居然有後既有先後居然有中莊子云方生方死此並明三世但言約理玄世未能悟耳朝廷欲要之以榮先生眇然不顧宋帝乃於北郊築崇虚館以禮之盛興造構廣延勝侣先生乃大敞法門深弘典奥朝野注意道俗歸心道教之興於斯爲盛也第八卷云陶弘景字通明魏郡平陽人也篤好黄老備參道法自稱華陽隱居初憩句容縣之句曲山登巖告靜及齊明帝踐祚恐幽祇未協固請隱居詣諸名嶽望袟展敬遂周旋五郡經歷三年事訖迎還令憩鐘嶺使人往來月有數四餉賜重疊隨意所求朝野書疏交爲煩黷也第九卷云齊建武二年陶受勑東祈名山困尋經典也又云蔣負芻義興人也去來茅山有志棲託齊高帝於山造觀建元二年勑請於崇陽觀行道也第十二卷云孟智周梁武帝時人也多所該通梁靜惠王撫臨神忮請智周講光宅寺僧法雲來赴發講法雲淵解獨步甚相凌忽及交往復盛其詞辯智周敷釋焕然僧衆歎伏之也第十四卷云孫遊嶽字玄逹東陽永康人也却粒餌麻屑松與术齊永明三年敕徵爲興世觀主也第十六卷云孔靈産會稽山陰人也深研道要遍覽仙籍宋明帝於禹穴之側立懷仙觀詔使居焉遷太中大夫加給事高皇賜以鹿巾猨裘竹素之器手詔曰君有古人之風賜以林下之服登凡之日可以相存之也第十九卷云徐師子字德威東海人也陳武帝立宗虚大觀引師子以爲觀主後六七年卒于館文皇勑賫祕器并無常與凡厥喪事皆取給臺焉投山水龍簡品洞神經第十四云凡學長生存神明者山仁水智動靜所依依仁者靜而壽也依智者動而樂也樂近水壽如山山居翫水長生之方也當投簡送名拜見山水之靈靈皇帝君佑護善人使弘仁智長生神仙也八節日寅午時朱書白槿簡一枚曰曾孫某州郡縣鄉里位姓名志求長生移籍太清改死録著生符計字滿簡詣山向王燒香發鑪再拜讀簡畢再拜長跪青紙裹青絲纏再拜巖石上勿令人見復鑪還勿反顧也詣水汎舟中流再拜訖向王發鑪心拜讀簡畢又拜裹纏如法以净石系之令沈立春爲始三年二十四過必能降眞若公私意外一節致闕者更從初始數滿未感功少行麤更勤立功精謹修之久久神降自知吉凶幽顯了然道成乃止也赤書玉訣上云元始靈寶告水帝削除罪簡上法曰靈寶黄帝先生某甲年如干歲某月某日生願神願仙長生不死三元同存九府水帝十二河源江海淮濟溟靈大神乞削罪名上聞九天請詣水府金龍驛傳某年月朔日子於某國士地告文右朱書銀木簡上以青紙裹簡青絲纏之金龍負簡以投三河之淵初用金鈕九隻連簡沉之後投不須三過都止投簡當於清泠之淵北向叩齒三通讀簡竟祝曰元始五老上帝高尊十方至眞太華靈仙赤文告命無幽不開上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二水源九府水帝溟靈大神今日上告萬願開陳請投玉簡乞削罪名千曾萬祖九族種親罪相連染及得我身普蒙削除絶滅種根記名水府言上帝前七祖父母去離八難上登九天衣飯自然我罪釋散萬神咸聞請以金龍關盟水官請如所陳金龍驛傳又云元始靈寶告五嶽靈山除罪求仙上法曰靈寶黄帝先生某甲年如干歲某月生命屬黄帝名係太山願神願仙長生度世飛行上清五嶽眞人至神至靈乞削罪籍上名九天請詣靈山金龍驛傳某年月朔日子於某國某嶽告文右朱書銀木簡青紙裹之青絲纏金鈕九隻金龍埋本命之嶽悉如上法於本命之嶽東向叩齒九通讀簡竟祝曰玄老開眀元始監眞上帝五老赤書丹文天地本始總領三元攝氣召會催促舉仙高上符命一道十天日月星宿五嶽靈山天下地上溟靈太神監生主録南上三門關領玉簡勒名舟編削落罪書上補帝臣千曾萬祖九族種親皆蒙解脫五道八難去離三惡魂昇九天生死開度萬劫長存今日上告萬神咸聞請以金鈕關盟眞官請如所告金龍驛傳又云元始靈寶告九地土皇滅罪言名求仙上法曰靈寶黄帝先生某甲年若干歲某月生命系九天中斗領籍願神願仙長生度世飛行上清中皇九地戊己黄神土府五帝乞削罪録勒上太玄請詣中宫投簡記名今願自信金龍驛傳某年某月朔日子於某郡國鄉里中告文也右朱書銀木簡青紙裹之青絲纏金鈕九隻金龍一枚埋所住中宫悉如上法於中庭向王叩齒十二通讀簡竟祝曰天開地張九氣分靈三光同符十方朗清五老上帝開眞領生丹書玉文堯始上精普告天下九土皇靈今日上告萬仙定生我願我仙請投玉名土府太皇勒除罪刑奏簡上宫列簿華青昇得飛騰天地同靈九族種親腐骸更榮魂昇南宫受化仙庭吉日告命萬神咸聽請以金鈕表盟至情請如所告金龍驛傳道言欲度諸天人民便離五道八難之中得過三惡世世與道相值當以八節甲子之日投三元玉簡除宿罪簿言名上天事事三過諸天三宫九府更相屬寄上天友别萬神敬護五帝侍衛三界司迎門户整肅天下地神日月來朝千魔萬精不敢妄干志願堅白觸向咸成七祖父母即得解脫三塗五苦上昇天堂生死福慶影響相酬三官九府書人功過其理甚明也三洞珠囊卷之二
