body:
  text: 大唐陸海羽客王懸河修服食品列仙傳下云斷食休粮以除穀氣呼吸導引吐故納新内音玉字上云子欲爲神仙不死當去三蟲心下伏尸常以夜半鷄鳴祝曰東方青牙服食青牙飲以朝華三嚥止南方朱丹服食朱丹飲以丹池三嚥止中央之野戊己昂昂服食精氣飲以醴泉三嚥止西方明石服食明石飲以靈液三嚥止北方玄滋服食玄滋飲以玉飴三嚥止如此三十日三蟲皆死伏尸走去正神正氣自然定伏尸不復還心中兆自仙矣此爲五方五牙之法此即是五厨也故老子五厨經云修奉太和不虧不盈嘗之無味嗅之無馨子得聞之命合眞星一受不退長樂自然是也又太上黄素四十四方經亦有此食祝之文也天文上經云玄古之人所以壽考者造次之間不食穀也大有經曰五穀是刳命之鑿腐臭五藏致命促縮此粮入口無希久壽汝欲不死腸中無滓也道學傳第七云陸脩靜字元德吴興東遷人也雖外混世務内守貞樸少已習斷穀别牀獨處也第十六卷云陶炎字愛靜廬江潯陽人也年十五六服食絶穀初猶食麪後唯食棗也靈寶齋戒威儀經訣下云道士食五穀斷無所餌則飢若服藥物正中服之過中聽飲清水飲而絶食平旦飲粥日中菜食大眞科下云受外内治録學仙之人皆當服食嚥氣却惡治病未能斷穀者食宜有常旦粥也中羹飯也乾蔬鹽豉示止饑而已不得適口貪香美滋味慎勿殺生肥鮮狼藉至於醬醋亦不可多多則損性又不得過飽恒令限少一兩口乃爲佳也食已便行逍遥調適臨食食訖悉存先聖洪恩垂逮銜荷無窮普念一切咸同飽滿當得甘露芝液無饑不復食啖世間塵味若受他施食皆慙謝主人心口願念施主富樂飽滿長年同得法味永免災衰無饑渴想常有法食及世間食施與一切無有窮盡濟度舍氣不生悔恡終無嫌恨長共歡樂初食食訖出飯布散山水之中巖林之下籬墻之邊勿擲屋上蟲鳥發穿致漏弊也太上黄素四十四方經云凡道士臨食當以左手持箸琢盤三過乃微祝曰二玄上道四極清冷太一帝君百神黄寧受粮三宫溉灌脾靈上饗太和餐味五馨魂胎之命七液流停百關通和五藏華明雙皇合景飛行上清食畢又琢盤三過此名爲魂胎受馨百神饗粮之道常能行之令人神明氣和魂魄安寧辟惡除試常保利貞神仙傳第九云介象字元則會稽人也入山見仙女象叩頭求乞長生女曰汝血食之氣未盡斷穀三年更來吾上於此待汝象歸斷穀三年更來乃復往也此女故在前處乃以還丹經一首以授象合象曰得此便得仙勿復他爲也九華經云日者霞之實也霞者日之精也服之體生玉光霞映上清之法也三皇齋儀云修道之人日中一食夜半生氣時食此日夜兩食皆取生氣時避死氣時也他時纖毫不得安嘗必犯死氣也若疾患採藥或服餌休粮各隨所宜不拘制限夫食以養身身安神樂不饑之者修學易成餓困虚羸功業不就也又云一食道時皆燒香以存供養先聖臨目思見前神降見歆饗良久願念施及一切咸同飽滿洞玄五符經云食月之精可以長生食星之精上昇太清也登眞隱訣第二云服雲牙可絶穀去尸也登眞隱訣第四云服雲牙可修眞一之道守元嚥液若似饑當食麵物以漸遺穀却粒不得一日頓棄所謂損之又損之以致於無爲也金簡玉字經云服食斷穀者忌食酒肉及五辛之菜皆當沐浴潔衣燒香也亦見大有妙經也太一洞眞玄經云子既不能服食去穀清腸研眞者且當節諸臊穢血腥雜食葷辛之菜一爲禁絶者可以度生命之長也又云紫微眞仙王夫人勸服术叙云眞人養生太上所寶七經五華二淳内道演出服御衆藥採釋百草禳癘固命术爲最好流激百邪消疾耐老體生光潤充肌填腦非夫勤慕可得謂無天然不爲术方必也枯槁矣又云養性駐年玄髮不變此术家之所治也又云夫术乃辟塞邪津氣遏鬼路矣餐其九餌則靈心四數榮衛輕盈服其煎散百疾瘳除可以長生久視也合术之方爲文多故此不寫出也又云以兩手摩拭面目今小熱以爲常每欲數也人之將老面皺者先從兩目下始也人之體二氣少者先從兩鼻間始也謂此二處皺衰之户人氣力之關津故起居常行此法以辟皺衰而氣力常保康和也太平經第一百一十四云青童君採飛根吞日景服開明靈符服月華符服除二符拘三魂制七魄佩星象符服華丹服黄水服迴水食環剛食鳳腦食松梨食李棗曰銀紫金服雲腴食竹筍佩五神符備此變化無窮超凌三界之外遊浪六合之中登眞隱訣第七云服五石者亦能一日九食百關流淳亦能終歲不饑還老反嬰遇食則食不食亦平眞上仙之妙方斷穀之奇靈也陶隱居注云雖一日九食而吸響流變不變不爲涬終歲不飯而容色更鮮青君曰干石䭀飯東青朱英一服立使人長筭千祀日服日延又清靈眞人說霍山中有學道者鄧伯元王玄甫受服青精䭀飯吞日景之法用思房以來積三十四年乃内見五藏冥中夜書又云三蒸青飯非常來也又云食麵乃易减穀也或補實易充耳腸胃填滿不復虚踈服䭀飯百害不能傷疾疾不能干去諸思念絶三尸耳目聰明行步輕騰也注云丹青和神養氣能禦却灾癘故疾害不復犯既精魂諧樂無有憂悲雜念肴穀既休尸蟲自然消絶肝腎清潤耳目瑩徹筋彊骨勁行動如飛又云凶年無穀或窮不能得者皆單服南燭或和茯苓或以蜜和南燭或雜松栢葉也又云夫斷穀不必長生必須斷穀者蓋以遵修靈妙息肴休粮之累服御藥石求易效之致又云因穀以斷穀化六府於毫漸又云吸引之易感無貴於七曜修行之早成不過於九道保守之貞固弗踰於鎮生衛用之急防莫超於渾神藥石之速效豈勝於青精祈拜之至感孰賢於朝謝也服五石鎮五藏若暫死白骨如玉七魄營侍二魂守宅三元歡息大神内閉外注皮肉假來附身故並應散朽但使藏府不壞色狀如生骨髓不枯筋腦相注魂魄鎮守三宫晏靜大神既不輪遊九變恒内閉於洞房須當生之日乃復周流也或四十年二十年十年三年隨意而出當生之時即便收血育肉生津成液復質成形乃勝於昔未死之容眞人鍊身於大陰易貌於三官此之謂也天帝君云太陰鍊身形勝服九轉丹形容端且嚴面色似靈雲上登太極闕愛書爲眞人也又引九華安妃曰憂累靡干於玄宅哀念莫擾於絳津淡泊眇觀顧景共歡俯仰四運日得成眞視眇所涯皆已合神正月四日三月十五日四月八日六月四日七月七日八月八日九月九日十月五日十一月三日十二月十二日並朝玉是也正月九日二月八日三月七日四月六日五月五日六月四日七月二日八月二日九月一日十月十日十一月十一日十二月十二日並朝太素也正月一日二月二十日三月二十七日六月六日八月二十日十一月三日十二月六日並朝太極也月七日十一日十五日存玄丹月一日十一日十六日二十一日二十六日存寶鏡存寶鏡者存見兩目變成兩明鏡照我一體也月一日十五日二十七日服明堂符皇象符丁卯日朝青童君建除日存三一寅時存上景符三部服玄眞卯日服霧服日象仍服日芒服七星符解化符朝太微朝玉晨服三氣足龍戌時服月精服玄眞服月芒亥時吸水祝三雲祝五笥祝六宫存大君卧祝劍環仍存斗存下景存頭五辰丑時存雙景皆是修道之方也又云昇玄飛步廻謝拘魂制魄亦是其方也上清消魔經云琅玕鬱華七陽日嬰九琳之液八瓊之精四蘂紫漿五珠降生三華飛剛雙珠月明蘭液金𥹋甘露玉瓶神蕖丹散雲柯連營琅玕朝結西皇素盈漱而變之以入紫庭又云東極織女之水西盡長庚虞淵南窮陽光之根北測太陰液城又云北採玄廓之綺柰仰漱雲山之朱蜜東掇扶桑之丹椹俯探長淵之文藻上和九轉之飛玉下嚥青玄之霞寶太虚結鐶素嬰懷抱紫虬童子九包鳳腦太極隱芝絳樹日道太上虹李天漢大草南宫巨珠西卿扶老三梁龍華靈妃所討有得食之分神億道又云上清幽芝太和斑龍黑胎文虎白沫出于西丘七玄飛節九孔瓊珠雲漿琳液玄圃琅腴鐘山白膠金生青敷閬風石腦黑河珊瑚蒙山白洩玉肺靈丘蒼鸞金津東英朱瓜九節交結太微紫麻瓊華玉實流淵鯨波赤河絳璧北汲太極之井中掇文朱之脉雲庭神桃崑園玉液夜精日草青津碧荻上招神光下飲玄瀨仰握玄圃之瓊精俯摘園丘之紫柰白水靈蛤八天赤薤萬載一生流光九裔有得食之太上之寶貴也又云九石鍊煙丹液玉滋荀首流珠斑華石精丹鑪金液紫華虹英太清九轉五雲之漿玄霜絳雪騰躍三黄東瀛白香滄浪青錢高丘餘粮積石飛田太虚還丹太素玄堅長光流草雲童飛千亦能使人上飛輕舉也又云三十六芝飛鑪鍊煙陽水月華五公之腴鎮生五藏鍊貌易軀乃至瑰葩雲屑金粉玉柔亦能延年至萬歲也又云玄水雲華漿五黄鬱靈中精干石䭀飯衆青朱英白車飛節之實流烏紫术之黄一服立使人長筭千紀也又云松栢陰脂山薑伏精菖蒲麥門冬巨勝黄精菊花苟杞崖蜜伏苓桃皮澤瀉萎蕤黄連升麻地黄赤箭朱英靈飛冰桂服之小益也無上昇青天之期也太一洞眞玄經云太一吸取紫煙也太一者人身中之神八素經云月華日曜之氣映乎東井也二十四生圖云朝列五星精中翕日中津夕食黄月華八素陽歌九章云仰翕瓊珠華俯乃覺明開登眞隱訣第七云歲月就遠精勤無虧彊體鍊氣修藥得宜然後五腴改貌玄水之液也七陽變質曲是精也鶴竦沖虚九轉丹也龍翻駕日琅玕華也錫書玉階詣太微也受事瓊室詣玉晨也吾道畢矣又云飛琅玕之華漱龍胎飲瓊精服金丹挹九轉服靈寶行九眞白琅之霜十轉紫華隱遷白翳神散石精金光靈丸此是金劍經曲晨丹滓九宫右眞公郭少金甘草丸方長桑公子服术方扁鵲起死方胡麻散伏苓丸九琳玉液八瓊飛精太上制仙丸是八瓊丹也太極眞人青䭀飯上仙靈方太極眞人採服雲芽玉方高丘先生四扇神仙散方龜臺王母四童靈方太上八瓊飛精丹服胎法還神守魄黄赤内眞保靈松煙流青紫丸初神去本剬蟲丸赤丹金精石景水母此紫文服日氣法黄氣陽精藏天隱月此紫文服月精法黄水月華徊天玉精環剛水陽青映赤樹白子絳樹青實琅玕華丹太極隱芝九眞五公石腴石精金精藏景化形法解鍊之道反行法服玉液潮腦精心鏡道具百神守玄中道遁變化景道遁變隱景道隱解法九精鍊氣轉皇存心術鍊魂法杖解法水行不溺法飛解脫綱道九靈明鏡守玄白術吞日景法服丹霞道守五藏含日法服氣法食日精雲氣迴行道服日月氣服日月象日在心月在泥丸行九息服氣服三氣玄眞法玄眞服霧氣法服五星氣服日月晨氣服胎氣丹砂幽精金碧紫漿八瓊絳液龍胎鳳腦雲琅玉華九鼎雲散虹丹石腦九華丹北育火丹流珠丹鑪火丹岷山丹虹丹之液雲華丹鳴丹金液導仙八方石中黄雲漿太極眞人遺帶白散青精石飯流明散制仙丸剬蟲丸澤瀉栢實丸澤瀉术散登眞第七云五石雲腴青童君曰五公之腴鎮生五藏鍊貌易軀已下出五石雲腴訣第四登眞隱訣引而注之第三卷中有琅玕丹曲晨丹九轉丹五公石腴青精石飯四鎮丸四童散四扇散甘草丸初神丸伏苓丸胡麻丸流青丸流鍊腴服术又云朱黄塞耳消尸是鍊魄之要道剬魄法䭀絶滅三尸雲芽絶穀去尸初神丸穀蟲死三尸枯五行紫文以除三尸服白芒消去三尸數沐浴蕩鍊尸魄又云服食斷穀休粮山林斷粒以清腸清齋休粮服䭀飯五年穀斷嚥雲芽以斷穀欲斷穀先服初神丸太一四鎮丸亦以斷穀子不斷穀大洞未可得聞斷穀世自有方此九條以斷穀爲善也又云甘草丸服少欲食協穀而仙次服䭀飯兼穀勿違益體除疾肌膚充肥然後登山詠洞講微右此二條以不斷穀爲善也會以七白靈蔬合薤同消故云會也雲草玄清者黑巨勝之腴者术之精雲草者以草潤澤如雲亦諭雲能含水草中有津也玄者色也清者資也卉醴華英者白蜜也醴衆卉之英華釀之以爲醴蜜土精也五光七白靈蔬者薤菜也薤音胡邁反五者五月不動掘之避盛火之害七者金數白薤辛金味也薤金之精也靈蔬者謂神菜也白素飛龍者白石英也白素衣其形色飛龍取其隱變玄水玉液玄清之腴水也玉液石英之液也一名飛龍雲腴飛龍石英名也雲腴雲腴草也一名鍊五石之華膏華者英也膏者玄腴也扇南燭之東暉招始芽之朱靈南燭陽物之精東暉伏靈之光津始芽荊葉之軟也朱靈丹液之鮮潔者五液夷泯百關通盈五藏之液平和調定而關節皆得宣溢故無復淍枯之患又云復勵以晨漱華泉五方靈精鳴鼓玉池呼吸玄清兼用雲芽之法漱濯清泉以助充其潤則氣質並康也華腴童於䂓方胃滿鎮乎空青者宻能變老還少使目青色潔空青鎮胃補液故腸滿肌光又云所以千筭一啓壽隨年榮歲與藥進飛步仙庭服盡一劑命不復傾五雲生身體神氣精者青童云長筭千祀謂一劑而已故言千筭一啓服十劑則壽萬年五方之老來降青精之人神附體則成眞人也太極眞人青精干石飢飯上仙靈方也注云此草有青精之神而又雜朱青以爲干飯故謂青干石飯也音迅此則諸宮上仙之靈方非下法也䂊章西山青米吴越青龍稻米是也青米理虚而受藥氣南燭草木擣取汁以淹青龍之米作藥服之其樹是木而似草故號曰南燭草木也一名猴藥一名男續一名後卓一名惟那木一名草木之王生嵩高少室抱犢雞頭山名山皆有非但數處而已江左吳越至多其土人名之曰猴叔或曰染叔似梔子其子如菜英清虛眞人王君內傳說其方法大具也上元寳經曰子食草木之王氣與神通子食青燭之津命不復隕也青精南燭故兼云青燭也服之仙矣又云常漱玄池之華以益六液也注云勤修雲芽之道以充六府之氣也空青者虛曜而童面上仙品石藥及草木也荊木者六甲隂符云一名羊櫨一名空䟽一名壯荊上清六甲內經有上清瓊宮五帝內思上法上清靈飛六甲內思通靈上法清虛眞人醮飛上法八素經云日精赤以金精石景水母之英錬於日魂曜精八芒服之精元幽關體生竒光與日月同年月光黃華常以月十十五日經於東井之上沐浴靈暉瑩飾精芒鮮明黃華也夫欲求仙當以其日採黃華於東井服陽精於月魂潤流九孔之向神鎮五府之宮修行其道上昇月庭月魂在東井之內則日月通暉之户三元眞一經云蘇林服保靈松煙流青紫丸令人長生出隂入陽顔色日少與玉同光又曰眞人涓子云必欲服食者當先去三尸三尸不去雖斷榖絕五味蟲猶不死人體重滯所夢非眞顛倒翻錯邪欲不除由於蟲在其內搖動五神故也又云制仙丸者太上八宜飛精之丹也又有制蟲神丸也又云琴高先生受鎮氣益命之道又行補精反丹之法寳剱上经云太極曲晨八景飛精名之曰太極藏景録形靈丸服之能浮景雲霄飛行太虛三元玉檢云九天眞王乘九色之鳯也三道順行經云南極上元君受高上順行三道之要黄氣陽精之道翕御靈暉口歠皇華仰餐飛根存七曜於紫晨三景垂映七精翼軒五靈交帶四司結篇西龜定録名題高晨也登眞隱訣第四云太極眞人服四極雲芽也寶劍上經云胡仙芝草飛天之華又有反生之香玉蜜之山也金根經云餐霞嚥氣咀嚼玄根大有上經云泥丸天帝三一者乃一身之靈宗百神之命根津液之山源魂精之玉室是以胃池體方以受物腦宫圓虚而適眞萬毛植立千孔生煙德備天地混洞太玄故名之曰泥丸泥丸者體形之上神也又云兩眉間却入左有明童眞君右有明女眞官中有明鏡神君此三君共治明堂宫腰帶四玉鈴口銜玉鏡鈴並赤玉也若道士恐畏存三神使鳴玉鈴使聲聞太極使吐鏡光令萬丈存見此三君口吐赤氣使灌兆口則千妖伏息萬鬼滅形若道士饑渴吸而嚥之須臾吐赤氣使灌兆口因吸而嚥之須臾自飽也又旦起皆嚥液三十過以手拭面摩目以爲常存唾變作津液也太一帝君洞眞玄經云欲存服日月之氣者當知日月景象日圓形而方景月方精而圓象景藏形内精隱象中景赤象黄是爲日月之魂若知其道乃可以吐納流霞也服日氣之法以平旦採月華以夜半存之令光景照我泥丸下及五藏洞徹一形常得長生又云存日入我口如𥹋味也存月入我臍中當命門下照陰室之間也又云閉目啄齒五過以左手第三指捻鼻下人中七過以右手第二指捻兩眉九過此爲却轡三五七九封制百神門户之法也玄母八門經云太素眞人所服之藥者雲草玄清者黑苣藤腴也一名玄清也卉醴華英者白蜜也五光七白靈蔬者薤菜也白素飛龍者白石英也黑苣藤腴白蜜凝雪者又云雲腴者味香甘美彊而補精鎮生五藏守氣凝液長養魂魄眞上藥又云腴蜜名曰玄水玉液一名飛龍雲腴一名鍊五石之華膏也至十五年身有玉光内外洞徹長生天地役使鬼神三年之後眼見夜書也此藥逾於八石之餌也又復五石入喉寶鍊五藏五藏上皆生五色華也又云常服日月之精華者欲得常食竹筍竹筍者日華之胎也一名太明又欲食松葉也松者木之秀也欲服日月當食此物氣以感運也太虚眞人曰松者木之秀也其松栢皆曰秀木也大洞經云道君散教養形吐故受新攝精逐穢漱晨華以招日皇挹夜明以抱月珠結璘吸霄雙景合遊飛芝葩玄靈若被岫又云道君吐納七冥六度揮惠八解寄成略略遠暢飄飄絶冥心泊節淡以迴孩嬰也又云道君仰簪日華拾落月珠摘絳林之琅實餌玄河之紫蕖偃蹇靈軒領理虎書又云曖沫三黄絳液易精九琳吐芒琅玕百變碧映水陽八瓊飛景萎蕤緑漿曲晨乘霄流金月眀玄津玉液靈腴五公光葉散音一唱八張波若火精伊離玉薑金鏊百會舍利鍊香鬱鬱靈寶化易文章刀圭既陳壽不可量寔眞元之珍藥上帝之所祕也或鍊五雲玉華靈金餌朱魄緑蕖華腴碧精南燭翠沉沙空青朝採五晨玉淵素漿亦能反故還新變老得嬰也又云懸䔧五鍊而水柔九琳洞合而玉成火琅遂珠流金採瓊有齊上契命胡可傾登眞隱訣第四云太極眞人服四極雲芽神仙上方揖五方元晨之暉食九霞之精也注云謂清晨之元氣始暉之霞精日陽數九是曰九霞本文云所以神光内曜朱華外陳體生玉瑛注云形與明挹晨暉以止渴食霞精以充粮藏府與神光合曜色貌隨朱華共鮮玉潤映體和氣明形皆五晨之靈鋒六澧之淵液所能致也又云得九琳玉液八瓊飛精者則合終二景天地同符也又云虚淡内充守元嚥液所謂眞一也又云致神以六液五氣又云常嚥赤液以哺養三宫也又云雲芽者五老之精氣太極之霞煙故採暉景之鋒以充於六液之和洞微冥感萬神來降幽映相求不唱而應是以龍吟方淵故景雲落霄虎嘯靈丘故衝風四振陽燧招明而朱火鬱起方諸罕陰而玄流湛溢自然不覺所測况學者方棲心注玄精研道根穢累豁於中胸眞正存乎三宫採五晨之散暉服六體之霞漿稅九天之奇寶吐玄妙之祕言龍曜發躍明光七焕味三華於皓齒取飽液於脣鋒内鍊六府開聰徹明呼吸天元魂魄鍊形也眞誥第五云黄山君訣曰養性服食藥物不欲食蒜及石榴子道士自不可食又禁房中既令藥力不行又計食一斤損筭百日也沈羲口訣服神藥勿向北方大忌亥子日不可唾亡精失氣减損年命藥勢如土眞誥第七云漢昭帝時張慶之女名微子常服霧氣自云霧氣是山澤水火之華精金石之盈氣也久服之則能散形入空雲氣合體微子云受此法於東海東華玉妃渟文期也又云女眞傳禮和服五星氣得道也又云仙女范丘林行挹日月之景服九靈明鏡之華又云陳世京服術及澤瀉寒華也又云玄一眞人初入天台山服食胡麻也又云司馬季生服明丹之華挹扶晨之暉令顔色如二十女子鬚長三尺黑如墨也眞誥第九云左採日華右掇月根也上清九眞中經内訣修奔日月祝曰食青精日𥹋飲雲碧之腴宴八極之城登明眞之臺坐希林之殿詠玉晨之詞也又曰日魂精神珠景赤童使我西到六領之門入協晨玉宫八紘素丘八景上房得帶千明之符佩流星夜光之章坐太和之殿登七靈之臺飲月華雲膏食黄琬紫津𥹋詠高上之篇吟玉晨之詞也又云太上八景四蘂紫漿五珠絳生神丹方此丹有八名或名曰四蘂華或名曰太微紫玉腴或名曰五珠華丹或名曰絳生晨華或名曰三華上丹或名曰太上飛剛或名曰九晨上丹也後聖道君列紀云黄水月華丹徊水玉精丹水陽青映液也故太上眞人宴觀七覺遊翔萬方寔由四液之飛津五珠之丹皇也又云服之唾地則爲日月之光也又云北都琅玕華則絳生之丹粒也七星移度經云渴翕良井洪泉玉芝饑納龍胎瓊腴絳樹赤子紫度炎光經云九皇太精北極眞君益我精胎彊我三魂左引日華右拘月津道基吐納經云道士修身吐納休糧一旬精氣微熱顔色萎黄二旬之時動作眩冒支節悵恨大便微難小便赤黄或時一利前溏後剛前至三旬身體消瘦重難以行四旬之時顔色轉悅心志安康五旬之時五藏和調精氣内養六旬之時體復如故機關調良七旬之時心惡譁諠志願高翔八旬之時恬惔寂寞信明術方九旬之時榮華滑澤音聲涣章十旬之時精氣皆至其效日昌修之不止年命自長三年之後灸瘢除减顔色有光修至六年髓填腦實豫知存亡經歷九年役使鬼神號曰眞人上佐上皇與天同壽與日合光傳非其人身受其殃天文上經有龍胎金液九轉之丹守形絶粒辟除萬邪五號先生儀有紫庭金夜也玉訣經下云元始五炁常以鷄鳴上會靈寶玉山玄都上宫陽光初明散元始之暉流觀諸天其氣鬱鬱其暉熏熏精如月珠光如紫雲氣運轉如車之輪上御九天之關中固五帝靈山下注云學士五牙之根上宫衆聖大智眞人皆以其時餐食其暉仰嚥其精與天相承致得無窮也後聖道士休粮長齋五嶽絶塵人間遠思清眞者得日日服日根之霞吞太陽之精則立覺體生玉澤面有流光位爲玉皇道引三光經云三光者一名流精二名澤嬰三名法氣四名陽王五名雲華六名導仙七名九變八名定光謂三光仙道鍊胎之術也道學傳第二云許邁字叔玄小時名映後自改名遠遊入新成道山服苣藤斷穀常服氣一氣千餘息晋永和二年移入臨安西山也又云高平閻玄之瑯琊彭初皆就遠遊受業遠遊口閻君可服氣以斷穀彭君宜須藥以益氣遂教彭以餌术並委質伏事三年遠遊曰君以解此但當勤修之耳專修矣心如死灰形如委骸可各索清靜處以自精妙於是玄之往於潛餌术爲務也第三卷又云王嘉字子年隴西人在東陽谷口鑿岸爲穴而自居不食五穀不衣華麗清虚服氣不與世交姚長慕容迎之不應也眞誥第五云范幼沖遼西人華陽中監也受胎化易形今來在此恒服三氣三氣之法存青白赤三氣各如絃從東方日下來直入口中挹之九十過自飽便止爲之十年身中自生三色氣遂得神仙此高元君太素内景法旦旦爲之臨目施行視日益佳也東海東華玉妃渟文期授含眞臺女眞張微子服霧之法常以平旦於寢靜之中坐卧任已先閉目内視髣髴使如見五藏畢因口呼出氣二十四過臨目爲之使目見五色之氣相繞纏在面上鬱然久行之常乘雲霧而遊也又云守玄白之道常旦旦坐卧任意存泥丸中有黑氣存心中有白氣存臍中有黄氣三氣俱生如雲以覆身因變成火火又燒身身通洞徹内外如一旦行至向中乃止於是服氣一百二十都畢道止如此使人長生不死辟灾却害尤禁酒肉五辛之味當别寢處靜思尤忌房室房室即死又云夫學道唯欲默氣養神閉氣使極吐氣使微又不得言語大呼唤令神勞損如此以學皆非養生也眞誥甄命第四云體摽高運味玄咀眞吸引景曜凝靜六神焕領八明委順靈根憂累靡干於玄宅哀念莫擾於絳津也眞誥第七云范幼沖遼西人也受胎化易形今來在此恒服青赤白三氣之法遂得神仙也又云徐宗度晋陵人受風谷先生氣禁道也又云龍述字伯高後漢時人從仙人刁道林受服胎氣之法託形解亡隱處方臺師定録君也又有劉阿平者居方山洞室中常服日月晨氣顔色如玉似年三十許人也本行經云昔禪黎世界隊王有女字曰絓音年至十四不言王棄之空山女之無粮食常仰日嚥氣引月服精自然充飽體不損常也空洞靈章云朝餐五雲氣夕噏三晨光又云食氣長阜穴嚥津黄水華閉夜拔朽骸還童及素牙身入不死劫名係玉靈都八素陽歌九章云七寶玉粒金丹紫芒隱芝左掇右拾夜光鳳腦虎沫雲琅瓊霜奇味一御則身拂太空奔日月二景隱文云飲月華雲膏食黄琬紫眞之𥹋也道學傳第二云無石飴餅以鐘乳代之此二物皆石上之津所生在許邁傳中眞誥云周穆王北造崑崙飲絳山石髓食玉樹之實也道學傳第三云燕濟字仲微漢明帝末時人也少好道德亦不仕於世矣初入華陰山服术及大黄精種雲母雄黄丹沙芝草也第十四卷云雙襲祖字仲遠梁時人也初斷穀羸瘦有富人范欣請爲辯名藥并給僕使採之俄更復常范氏所給水牛在山耕積年也第二十卷云女官蕭貞東海丹徒人也少離家入遺山學道唯餌柏葉也列仙傳上云赤將子輿者黄帝時人不食五穀而食百草華又偓佺者槐山採藥人也好食松實形體生毛長數寸而目更方能飛行逮走馬也師甪里先生受山隱靈寶方一曰伊洛飛龜祑二曰白禹正機三曰平衡按合服之日以還少一日行五百里能舉千斤一歲十易皮乃仙去清虚眞人王君内傳云主仙道君以雲碧陽水晨飛丹腴二升賜王君君即拜而服之積九年之中視見萬里之外能日步行三千里坐在立亡役使群神也甘草丸方出南嶽魏夫人傳第一者甘草六兩第二者丹砂三兩好者第三者大黄五兩第四者乾地黄七兩第五者白术十兩第六者五味五兩第七者人參五兩第八者伏苓四兩第九者當歸三兩第十者天門冬四兩第十一者木防己二兩第十二者猪苓三兩第十三者細辛二兩第十四者决明子二兩右十四物並令得精新上藥不用陳久者先各細擣不篩乃秤散取兩數足乃入臼以次内甘草擣一千杵次内丹砂又擣一千杵自從次第一種以次内臼輒擣一千杵凡十四種藥合藥一萬六千杵都合三萬杵藥成以蜜丸食後服如梧桐子大十丸寧從少起亦可服三十丸此藥内滅病無毒無所禁忌食一年乃大得其益無責旦夕之急效也俗中女服之令人多子無傷病也久服神仙不死矣合藥當在别室潔處不得令雜人多目見之亦當沐浴齋戒三四可擣治之百患千病治之皆愈不能一一紀所善之名也其服食吐納事諸經大有此不更録也三洞珠囊卷之三
