front:
  text: 三洞珠囊卷之七懷七
  hash: sha256:c3fa56ba9141327051289627c3dbc3c3936563e52a2777bd69b083754698b857
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_HFL_007-001a, image: hfl/0781/0781-076.png}
body:
  text: 大唐陸海羽客王懸河修二十四治品按玄都律第十六云治者性命魂神之所屬也五嶽名山圖云陽平治屬金屬角星鹿堂治金亢星鶴鳴治木氐星漓沅治土房星葛璝治火心星庚除治火尾星秦中治水箕星真多治金斗星右八治是上治昌利治土牛星隸上治火女星涌泉治木虛星稠粳治火危星北平治金室星本竹治木壁星蒙秦治火奎星平蓋治土婁星右八治是中治雲臺治火胃星濜口治木昴星後城治土畢星公慕治金觜星平岡治水參星主簿治金井星玉局治水鬼星北邙治土柳星右八治是下治已上二十四治並是後漢漢安元年太上老君所立岡互治水星星白石治金張星鍾茂治水翼星具山治土軫星地圖云此四治在京師東北右此四治是張天師所加充前二十四治合成二十八治上應二十八宿平公治屬水配湧泉治公慕治屬土配稠粳治天台治屬土配本竹治賴鄉治屬金配昌利治撙領治屬金配雲臺治代元治屬金配雲臺治利里治屬火配隸上治漓沅治屬金配昌利治右是天師更加此八治以配八品周布四海鎮國化人也第一别治有四者第一具山治第二鍾茂治第三白石治第四岡互治右四品在外名别治於內名備治備治足二十八也别與三八别也第二遊治有八者第一吉陽治第二平都治第三河逢治第四慈母治第五黃金治第六太華治第七青城治玉符經作青城山第八峨眉治右八品是遊治也第三配治有八者第一代元治第二撙領治第三賴鄉治第四天台治第五公慕治第六平公治第七利里治第八漓沅治右八品是配治也第四正治二十有四者第一北邙治第二玉局治第三主簿治第四平岡治第五公慕治第六後城治第七濜口治第八雲臺治右是下品八治也第一平蓋治第二蒙秦治第三本竹治第四稠粳治第五北平治第六涌泉治第七隸上治第八昌利治右是中品八治也第一真多治第二秦中治第三庚除治第四葛璝治第五漓沅治第六鶴鳴治第七鹿堂治第八陽平治右是上品八治也第五星宿治二十有八名上治一名內治又名大治又名正治是上皇元年七月七日無上玄老太上大道君所立上中下品二十八治要訣第一角宿上治無極虛無無形下治陽平山第二亢宿上治無極虛無自然下治鹿堂山第三氐宿上治無極玄元無為下治鵠鳴山此三治主辰生第四房宿上治虛白下治漓沅山第五心宿上治洞白下治葛璝山此二治主卯生第六尾宿上治三一下治庚除山第七箕宿上治三元下治秦中山此二治主寅生第八斗宿上治三五下治真多山此一治主丑生右上八品無上治第九牛宿上治九天下治昌利山第十女宿上治五城下治隸上山此合前三治主丑生第十一虛宿上治元神下治涌泉山第十二危宿上治丹田下治稠粳山此二治主子生第十三室宿上治常光下治北平山第十四壁宿上治金梁下治本竹山此二治主亥生第十五奎宿上治六府下治蒙秦山第十六婁宿上治一君下治平蓋山此二治主戌生右中八品玄老治之第十七胃宿上治五龍下治雲臺山此合前三治主戌生第十八昴宿上治隨天下治濜口山第十九畢宿上治六丁下治後城山此二治主酉生第二十觜宿上治十二下治公慕山第二十一參宿上治還身下治平岡山此二治主申生第二十二井宿上治拘神下治主簿山第二十三鬼宿上治無形下治玉局山此非山第二十四柳宿上治聚元下治北邙山此三治主未生右下八品太上治之也太上漢安二年正月七日中時二十四治上八中八下八以應二十四氣付天師張道陵也第二十五星宿上治别形下治岡互山第二十六張宿上治保氣下治白石山此二治主午生第二十七翼宿上治五王下治鐘茂山第二十八軫宿上治金堂下治具山此二治主巳生天師以建安元年正月七日出下四治名備治合前二十八治備應二十八宿也星宿治隨天而立歷運設教劫劫有受命為天師者各各申明濟世度人以至太平太平君出更加有司隨其才德進位大神也又張天師二十四治圖云太上以漢安二年正月七日中時下二十四治上八中八下八應天二十四氣合二十八宿付天師張道陵奉行布化張天師沛國豐縣人也諱道陵字輔漢禀性嚴直經明行修學道有方永平二年漢帝詔書就拜巴郡江州令以元和元年三月十日辛丑詔書拜為司空公封食冀縣侯以芝草圖經歷神仙為國採延年長生藥以漢安元年丁丑詔書拜應太上方任遂解官入益州部界以其年於蜀郡臨卭縣渠亭山赤石城中靜思樂情五月一日夜半時有千乘萬騎來下至赤石城前金車羽蓋步從龍虎鬼兵不可稱數有五人一人自言吾是周時柱下史也一人自言吾是新出太上老君也一人云吾是太上高皇帝中黃真君也一人言吾是漢師張良子房也一人言吾是佐漢子淵天師外祖也子骨法合道當承元老忠臣之後今授子鬼號傳世子孫為國帥無民無期於是道陵方親授太上步質勑當步綱躡紀統承三天佐國扶命養育群生整理鬼氣傳為國師依其度數開立二十四治十九靜廬授以正一盟威之道誅伐邪僞與天下萬神分符為盟悉承正一之道也上皇元年七月七日無上大道老君所立上治八品要訣掌中伏虧造天地五龍布山嶽老君立位治以用化流俗愚者不貪此真覽競所欲仙道何足訓傳之於質朴也第一陽平治在蜀郡繁縣界去成都一百八十里道由羅江水兩岐山口入水道四十里治道東有龍門拒守神水二柏生上西南有大泉决水歸東治應角宿貴人發之治王始終嗣師天師子也諱衡字靈真君為人廣智志節高亮隱習仙業漢孝靈帝徵為郎中不就以光和二年正月十五日己巳於此山升仙立一治碑一雙在門名曰嗣師治也右陽平治山山中有主簿治嗣師治系師治第二鹿堂山治治在蜀郡繁縣界北鄉去成都三百里上有仙室仙臺古人度世之處昔永壽元年太上老君將張天師於此治上與四鎮太歲大將軍川廟百鬼共折石為要皆從正一盟威之道山有松柏五龍仙穴能通船渡持火入穴三日不盡治應亢宿弓長發之治王八十年第三鶴鳴神山太上治治在其上山與青城天國山相連去成都二百里在蜀郡臨卭縣界徑道三百世人不知之馬底子何丹陽得道處治前三水共合成一帶神龍居之有四金釘二石金銀蠶三斛亦言尹喜主之治應氐宿賤人發之治王六十年神仙傳第五云張天師遇中國紛亂乃入蜀鶴鳴山學道也第四漓沅山治治在蜀郡繁縣界與鹿堂山治相連其間八十里去成都二百五十里上有果松神草服之升仙四龍神起騎之門范蠡主之治應房宿庶人發之治王二十年第五葛璝山治在蜀都繁縣界與漓沅山相連去成都縣二百三十里去陽平治水口四十八里揚仙賢於此得道上有松栗山高六百丈治應心宿道人發之治王九十年第六庚除治山去平地三百九十丈在廣漢郡陽泉縣西去縣五里去成都二百八十里上恆有仙人往來可以度厄養性昔張力得道之處山有二石室三龍頭淮水繞之治應尾宿當道士發之治王始終第七秦中治山在廣漢郡綿竹縣東去九里去成都二百里其山浮昔韓衆於上得仙前有火水東有道徑於漢洛治西有大石銅為志治應箕宿癲人發之治王始終第八真多治山在廣漢郡新都縣去成都一百五十里山有芝草神藥得服之令人壽千歲山高二百八十丈前有池水水中有神魚著五頭昔王方平於此與太上老君相見治應斗宿女人發之治王七十年無極元年十月五日真正無極太上立中治八品氣速訣掌中第一昌利山治在廣漢郡額縣東西十里去成都一百五十里昔蜀郡李八百初學道處八百唐公房之師也遊行蜀中諸名山常自出戲於成都市暮宿於青城山上故號為八百也其山南有一石室容八十人前有三龍門為志治應牛宿狂惑人發之治王五百年第二隸上治山季子先生學道飛仙治在廣漢郡陽泉縣東北百二十里山有二石室有一神井白鹿白鶴白鳩時來飲之有石在治前與慈母治相連西有赤石溪上有三松為志山去平地二千九百丈昔中山衛叔卿於此得道治應女宿貧賤人發之治王百年第三涌泉山神治昔廣漢馬明生學道得仙太上老君至此化形住此治在遂寧郡小漢縣界上有靈泉治萬民病無不差愈傳世為祝水治去成都二百里有懸崖百丈近綿水猴猿百鳥來在其間治應虛宿野人發之治王三十年其山小而高四向有遊道第四稠粳治在犍為郡南安縣去成都一百一十里汶山江水九里山高平地一千七百丈昔軒轅學道之處也治左右有連岡相續西北有味江水山亦有芝草之藥可養性命治應危宿貴人發之治王五十年第五北平治在犍為郡南安縣去成都一百四十里山上有池水縱廣二百步中有神芝藥草食之與天相久昔越人王子喬得仙治應室宿道師發之治王四十年一名𥐿山治第六本竹治山在犍為郡南安縣去成都一百二十五里山高一千三百丈上有一水有香林在治陌北有龍穴地道道通峨眉山上有松柏昔郭子聲得道之處也後有林竹西去十五里治鑿通鶴鳴前水尾常有神龍遊戲其中治應璧宿龍門吏人發之治王五百年第七蒙秦治山在越雋郡卭都縣西去城二十里去成都一千四百二十里治與越雋郡隔河水前有小山後有太山高一千丈昔伊尹於北山學道上有芝英金液草服之得度世後有漢中郡趙升治應奎宿凡人發之治王九十年第八平蓋治山在犍為郡武陽縣去成都八十里前山下有玉人身長一丈三尺昔吳郡崔孝通於此山學道得飛仙山西有大江南有長山北有平川中有龍門治應婁宿陰人發之治王千年無上二年正月七日無為大道玄真立下治八品氣要訣掌中第一雲臺山治在巴西郡閬曰縣西去六十里上山十八里方得山足去成都一千三百七十里張天師將弟子三百七十人住治上教化二年白日升天其後一年天師夫人復升天後三十年趙升王長復得白日升天治前有巴西大水山有一樹桃三年一花五年一實懸七百丈下無底之谷唯趙升乃自擲取得桃子餘者無能取之治應胃宿有人形師人發之治王五十年又雲臺治山中有玉女乘白鶴仙人乘白鹿又有天神來迎天師白日升天萬民盡見也此天柱山也在雲𦤼治前有立碑一雙第二濜口治山在漢中郡江陽縣去成都二千九百二十里陳安世於此山上學道得仙安世京兆人也漢中水過其前山一名平元山西有長山東有流海帝王所在青龍門治應昴宿俗人發之治王五百年第三後城治山在漢中郡南鄭縣昔㬊子然於此山上學得仙道左有大水後有重山山有神芝服之壽千歲一名黃陵山南有長山北有青龍東有松柏為志治應畢宿凡人發之治王八十年第四公慕治山在漢中郡南鄭縣去治一百里昔蘇子於此山學道得仙一名北逢仙山南有石坎北有懸流水治應觜宿病人發之治王七十年第五平岡治山在犍為郡南安縣去成都一百里昔蜀郡人李阿於此山學道得仙白日升仙也治應參宿道士發之治王二十年北有三重曹溪南有持山為志第六主簿山治在犍為僰道縣界去成都一百五十里蜀郡人王興於此學道得仙一名秋長山南有石室玉堂松柏生其前治應苦宿微人發之治王八十年第七玉局治在成都南門左二里以永壽元年正月七日太上老君乘白鹿張天師乘白鶴來至此坐局腳玉牀即名玉局治也治應鬼宿千丈大人發之治王三世第八北邙山治在京兆郡長安縣梁水在治左務成子於此得道大黃山東有穴泉南有東流治應柳宿仙聖發之治王六十年天師以漢安元年七月七日立四治付嗣師以備二十八宿第一岡互治在蘭武山應星宿第二白石治在玄極山應張宿第三具山治在飯陽山應翼宿第四鍾茂治在元東山應軫宿嗣師以建安三年十月五日布立八品配治漓沅治在玄昌山利里治在高堂山平公治在牛頭山公慕治在身雄山天台治在黃牛山賴鄉治在小世山撙領治在單方山代元治在上堂山系師以太元二年正月七日立八品遊治峨眉治在蜀郡界青城治在蜀郡界太華治在京兆郡界黃金治在蜀郡界慈母治在城布山界河逢治在上黨郡界平都治在巴郡界吉陽治在蜀郡界系師者嗣師子也諱魯於陽平山得尸解仙道人立一治名系師治但嗣師治並主簿是天師門下也又立一治今按玄都職治律第九云代沅治平都治是外遊治也是知峨眉治等亦是遊治也二十四氣品按玄都開關律云二十四氣為天使一氣十五日一歲十二月月二氣終歲為二十四氣皆是自然之氣也洞玄經云三元以三氣置立三天三天者始氣為清微天元氣為禹餘天玄氣為大赤天宋文明通門上云少陰太陰少陽太陽又與中和之氣合以成五氣五氣就前玄元始三氣成數為八即大洞經云三元各八合為二十四氣衆生品族於是而生也此氣散之為雲霧合之為形影出之為分化入之為真一又此氣之本謂元始大梵之氣分而為三即成上三天也若登真隱訣時日詮次訣云二十四氣者立春雨水驚蟄春分清明穀雨立夏小滿芒種夏至小暑大暑立秋處暑白露秋分寒露霜降立冬小雪大雪冬至小寒大寒以為二十四氣也真誥第五云東方九氣青天南方丹天三氣流精西方七氣之天北方玄天五氣徘徊亦合為二十四氣也若是中央乃云中央黃中理氣總統玄真此不論氣數也以總統四方為二十四氣之主也上清三天君列紀經云夫氣之所在隨神所生神在則氣在神去則氣去氣者即二十四神之正氣也氣散則為雲霧合則為形影出之為仙化入之為真一上結三元下結萬物靜用為兆身動用為兆神也三部八景二十四神品出上清九真中經內訣已具録出在前第八名數八景品中此不再寫也二十四地獄品按太真科中卷云宛利天下酆都之山在北方癸地山上有八地獄主上三官第一監天獄第二平天獄第三虛無獄第四自然獄第五九平獄第六清詔獄第七天玄獄第八元正獄中央有八地獄主中三官第一玄沙北獄第二皇天獄第三禁罰獄第四玄沙獄第五形正獄第六律令獄第七九天獄第八清泠獄山下有八地獄主下三官第一無量獄第二太真獄第三玄都獄第四四十九獄第五天一北獄第六河伯獄第七纍劫獄第八女真獄右二十四獄獄有十二掾吏金頭鐵面巨天力士各二千四百人把金槌鐵杖玄科死魂以治罪罰也二十四職品按玄都職治去聲律第九云監天職主監亂真戾正也督治職主督察諸治正一師性行貪枉不依師法貢氣職主選擇男女官正一師考察身體瘡瘢形殘跛躄務得端嚴質素大都攻職主天下屯聚符廟秦胡氐羌蠻夷戎狄楚越攻擊不正氣惡人逆鬼盡當分明考録領功職主天下五方四海八極十二州百二十郡國一千二百縣萬二千鄉亭市邑屯沙聚石五嶽四瀆山川神祇之功賞直符伐殺萬鬼盡當了之都功職主功勞録吏散民𧵥義錢穀金銀玉帛六畜米物受取出入管籥倉庫府鬼神之物禮信及治殿作舍橋道樓閣神室盡主之也領神職主選擇賢良貶退僞惡對會諸氣諸有犯違盡主之也監神職主考素所犯狀結文書開視利害縛束謬誤化諭戒勑領署職主選署二十四職名籍功賞諸職文書次第校投命籍察氣職主察四方諸氣符瑞徵應平氣職主質天下之氣平均四方八極氣候主之也上氣職主收萬鬼分别正氣邪精都氣職主三會吏民請乞治救分别年紀郡縣鄉邑所受官號威儀職主教勑禮制衣服儀容法則起次位彈邪正非施行法禮領氣職主領五色之氣知其變異氣候并領知氣職也一本無領氣職領决職主鬼氣男女被氣傳語領决教分别秦夷胡戎狄氐羌真僞四氣職主諸治投言文書對會諸治户籍口數出死入生行神職主布氣宣化顯明道教道氣職主勸化凶逆化惡為善聖氣職主質對文書歲終功限謂狀言上者承氣職主承治醫療著功之勳典氣職主典諸職高下次第廉平職主監察廉邪均平飲食行教職主奉宣師教勸化愚俗不知法者建義職主表條功勞助時伏勤對應退也按上章律第十三云男職女職二十四職即此是也地發二十四應品按衆篇經云元始開圖地發二十四應上慶神真一者是時天元混沌未有光明晨雞啓旦四景朗清天玄地張成生五行二者三萬六千日月於是下土同明光尚幽夜照曜無窮三者青為銜書以告五帝正天分度四者白虎吐金安鎮玉靈五者青龍奉符以告水帝制會促運江海開張六者瓊鳳銜璽以獻帝王安國保祚五鎮長存七者驚鳳同唱飛鳴嗈嗈八者群鳥翔舞飛欣天端九者蛟龍踊躍鼓洋淵澤十者河水渟流魚鱗交會十一者甘露自生芝英雱𩃱十二者冬不冰霜枯木並榮十三者林木禾稼冬夏生華結實繁茂無有凋傷十四者四氣調和灾疫不行天人悅慶無有夭年十五者毒螫閉齒不生害心十六者師子猛獸依人為鄰十七者天下男女盲聾疲痾一時復形無有疾傷皆得康强十八者老年反少少年不老華容偉貌精彩光明十九者鳥獸六畜懷胎含孕已生未生皆得生育無有折傷二十者婦女懷妊普天生男二十一者地藏發泄金玉露形散滿道路無有幽隱二十二者天振地裂枯骨更生沉尸飛魂普起成人天下歌唱欣國太平二十三者地生蓮華天人稱慶莫不欣欣二十四者五嶽開洞符經並出教導其天人是時學者莫不飛仙也二十四真圖品按五稱符上經云欲求道法先沐浴去臭穢當得東井圖二十五性色者按左玄論中卷第九品云眼聞五色耳聞五音鼻聞五香舌聞五味身聞五觸第十三品云香謂羶焦腥朽芳也觸謂堅柔冷熱平諸者可知之也第十三品又云具此五五二十五性色者合成凡夫小命也二十七中法門名數品仙真聖二十七品二十七大夫二十七天人身中二十七生氣君仙真聖二十七品者按宋文明通門下云上品曰聖中品曰真下品曰仙也聖品以復有三也真品復有三也仙品復有三也合為九品也九品又各有三合為二十七品也宋文明道德義淵下又引八素經云上真給仙童玉女二千人中真給玉童玉女千人下真給玉童玉女五百人回元九道素經亦有差品大洞經云從生得道從道得仙從仙得真從真得為上清黃老君則上仙但備上仙之道未及上真也佛四果之人已稱賢聖成佛得道而號大仙道圓自始飛天而升太極及成無上方號高仙邪法身云轉神入妙形魂為一身神並一則為真身而成道也玄門論第十三位業品云界外三九二十七品賢聖之名者太真科云小乘仙有九品一者上仙二者高仙三者大仙四者神仙五者玄仙六者真仙七者天仙八者靈仙九者至仙也中乘真有九品一者上真二者高真三者大真四者神真五者玄真六者仙真七者天真八者靈真九者至真也大乘聖有九品一者上聖二者高聖三者大聖四者神聖五者玄聖六者真聖七者仙聖八者靈聖九者至聖也雖有三九不同而俱無欲並觀觀體不復無優劣故有仙聖之殊但上聖高聖大聖是聖之上品神聖玄聖真聖是聖之次品仙聖靈聖至聖是聖之下品聖品既爾仙真可知此三九人若望界內通是大乘也二十七大夫者按太真科云二十七大夫者聖真仙階各有九品三九二十七應宿也宿二十八日月桓舍其一一為隱故故二十七顯也二十七天者已具録在三名數三氣三天部中訖人身中二十七生氣君者按老子枕中開闔經云人身中自有二十七生氣君者髮為青城君頭為三台君兩眉為八極君左目為瞻明君右目為玄明君左耳為聽明君右耳為决明君鼻為周天妙户君口為牙門君脣為玉户君齒為二十八元士君舌為無極君咽為校尉君喉為九卿君肝為絳宫君肺為華蓋君膽為長命君心為丹田君臍為紫白君胃為太倉君脾為黃庭君左腎為玄妙君右腎為元正君大腸為食母君小腸為道引君腸為衛道君三焦為玄先君左股為小車君右股為徘徊君左足為雷電君右足為雲氣君二十七生氣常當世隱甲身君勿得妄出也今若細數乃有三十一君不詳之二十人中法門各數品二十八宿者按三皇三十二天齊儀云北方東壁營室危虛須女牽牛南斗也東方箕尾心房氐亢角也南方軫翼張星柳鬼井也西方參觜畢昴胃婁奎也四方各七合成二十八人修三皇齊請二十八宿以釋天羅地網基謪增延年算也謝五墓醮儀云東方七宿者角亢氐房心尾箕南方七宿者井鬼柳星張翼軫西方七宿者奎婁胃昴畢觜參北方七宿者斗牛女虛危室璧凡人家四十六世以來有咒詛盤結者此二十八宿能為人解而散之度星經云東方角宿字君帝亢宿字君明氐宿字君上房宿字君真心宿字君貞尾宿字君利箕宿字君長北方斗宿字君子牛宿字君居女宿字君陳虛宿字君通危宿字君參室宿字君王璧宿字君嬰西方奎宿字君時婁宿字君利胃宿字君明昴宿字君玉畢宿字君進觜宿字君明參宿字君成南方井宿字君節鬼宿字君居柳宿字君遷星宿字君明張宿字君府翼宿字君信軫宿字君乾皆能傳送亡人不令復連後生之人也前文二十四治山中亦俱列此名字訖三十二中法門名數品三十二天者按依如無量度人經云又內音玉字下云一曰太黃皇曾天去太明玉完天九億九萬氣今釋云一氣有九萬九千九百九十重二曰太明玉完天去何童天八億萬氣三曰清明何童天去平育天七億萬氣四曰玄胎平育天去文舉天六億萬氣五曰元明文舉天去摩夷天五億萬氣六曰上眀七曜摩夷天去越衡天四億萬氣太真科中卷云為欲界天陰陽有欲交接胎生積萬歲也義淵上云持十戒口業净者登欲界身業净登色界心業净登無色界入九品行者登種民天也此之次位已録在前三中名數品之中三業內文也內音云七曰虛無越衡天去蒙醫天三億萬氣八曰太極蒙醫天去和陽天二億萬氣右八天屬東方始青之氣九曰赤明和陽天去恭華天九千萬氣十曰玄明恭華天去宗飄天八千萬氣十一曰耀明宗飄天去皇笳天七千萬氣十二曰竺落皇笳天去堂耀天六千萬氣十三曰虛明堂耀天去端靖天五千萬氣十四曰觀明端靖天去恭慶天四千萬氣十五曰玄明恭慶天去極瑶天三千萬氣十六曰太焕極瑶天去孔升天二千萬氣右八天分度屬南方赤天十七曰元載孔升天去皇崖天九百萬氣十八曰太安皇崖天去極風天八百萬氣十九曰顯定極風天去孝芒天七百萬氣二十曰始皇孝芒天去翁重天六百萬氣二十一曰大皇翁重天去江由天五百萬氣二十二曰無思江由天去阮樂天四百萬氣二十三曰上揲阮樂天去曇誓天三百萬氣二十四曰無極曇誓天去霄度天二百萬氣右八天分度屬西方素天二十五曰皓庭霄度天去元洞天九萬九千氣二十六曰淵通元洞天去妙成天八萬八千氣二十七曰翰寵妙成天去禁上天七萬七千氣太真科中卷云此十八天為色界與欲界同陰陽有形不相交接人皆化生所啖香味無復便旋年積億歲不夭不傷也二十八曰秀樂禁上天去常融天六萬六千氣二十九曰無上常融天去玉際天五萬五千氣三十曰玉隆騰勝天去梵度天四萬四千氣三十一曰龍變梵度天去賈奕天三萬三千氣三十二曰平育賈奕天去梵行之氣一萬二千氣右八天之氣分度屬北方玄天太真科中卷云此為四種民天學真堪為人種王母迎之登上四天者名曰梵行雖危不敗安諸種人不墮三塗方遊三清也業報經中真說之已録在前四中名數例四種人天文內訖也及在三界名例文內也若作四方分者方有八天四八成三十二天若三界分者即如下文所云宋文明道德義淵上所說者此三十二天則專主人福果異乎九天及三十六天福果由於業行業行起六根眼耳鼻口身心也於口業能伏身心等則隨功次第生欲界六天六天者從太黃天至上明天為六天也於六根中有猶入前塵者有緣塵而不入者有漸不復緣入者凡三種三六為十八則生色界十八天十八天者從虛無越衡天至無極曇誓天為十八天也六根都不復緣入者則生無色界四天四天者從皓庭天至秀樂天凡四天是也所以止四天者六根並净但有仁義禮智唯四天故也若是信者屬於道境故不生三界也此都合二十八天為三界也雖伏而未斷習氣未除未能忘想故未得長存猶在三界壽盡則壞隨行所之也上從常融天至賈奕天為四天號東華南極西靈北真四宫洞入道境為世種民天下隨劫壞就前二十八天為三十二天也義淵下又疑曰太上五德同在一分唯取一信將非矛盾之耶答曰五德悉屬太上而云信屬於道不生三界者非言四德都不屬於道正言緣三界而升了信所以不緣三界者經云其精甚真其中有信也隱注云學道由丹信信為行本直登三清仁義禮智即道之德緣次而至無異大戒備五德而猶獨稱智慧也合通而言之則五德皆道也寶玄經亦云上德同天還與道合别而為語則一信屬道也四行屬德無異易云立天之道曰陰與陽立地之道曰柔與剛而復言天陽地陰乾剛坤柔玉訣云天無靈寶無以得生地無靈寶無以得成而復云生天立地上謂之靈施鎮五嶽下謂之寶又云在天曰靈在地曰寶合離通别多如此例識沉心忘或非矛盾也宋文明靈寶雜問云三界三十二天依如靈寶內音分置在四方定志經圖正作三重今義疏中解釋云如羊角而上與二事並違何邪答曰此乃所以二事兩通也羊角者猶莊子之義也敷齊威儀太極真人云莊子是南華仙人故其可據羊角則如腸道周回而上上者轉高此是重纍亦是遍四方也玄門論第二十云三十六天還是三清妙境雖復位居界表變化難思小則存入三宫大則遠超六合皆是聖應所分開化接引通論此氣非陰非陽玄絶清梵也次此已下按靈寶經以三十二天往明三界故度人經云元綱流演三十二天其三十二天並在空無之中周回十方起自東北扶搖臺羊角而上今依本元經配方如左第一太黃皇曾天氣係西北方梵氣第二太明玉完天氣係璧宿第三清明何童天氣係室宿第四玄胎平育天氣係危宿第五元明文舉天氣係虛宿第六上明七曜天氣係女宿第七虛無越衡天氣係牛宿第八太極蒙翳天氣係斗宿右八天位在東方木數納音九故總為九氣青氣係北方七宿第九赤明和陽天氣係東北方梵氣第十玄明恭華天箕宿第十一耀明宗飄天尾宿第十二竺落皇笳天心宿第十三虛明堂曜天房宿第十四觀眀端靖天氐宿第十五玄明恭慶天亢宿第十六太焕極瑶天角宿右八天位在南方火數納音三故總為三氣丹天係東方七宿也第十七元載孔升天係東南方梵氣第十八太安皇崖天軫宿第十九顯定極風天翼宿第二十始皇孝芒天張宿第二十一太黃翁重浮容天星宿第二十二無思江由天柳宿第二十三上揲阮樂天鬼宿第二十四無極曇誓天井宿右八天位在西方金數納音七故總為七氣素天係南方七宿第二十五皓庭霄度天氣係西南方梵氣第二十六淵通元洞天參宿第二十七太文翰寵妙成天觜宿第二十八太素秀樂禁上天畢宿第二十九太虛無上常融天昴宿第三十太釋玉隆騰勝天胃宿第三十一龍變梵度天婁宿第三十二太極平育賈奕天奎宿右八天位在北方水數納音五故總為五氣玄天中央土數納音一一以總四方故不别置又仰三清以為中止也此三十二天運行不息氣係者陽動於陰陰動於陽也三十二天以次差馳旋方而上羊角道周仍登梵行入三清也隱注寶訣云玄階興扶搖臺在東北方玄天也興起也言天階起發於扶搖也又內音及五鍊生尸皆羅三十二位施置四方今聊依此文一途往說也問人屬天何不屬太黃皇曾赤明和陽元載孔升皓庭霄度等四維天耶答曰維中無宿故老君聖紀第十卷僞惑品云此即玉清境元始天尊位在三十五天之上也又云大至真尊聖紀云此即上清境太上大道君位在三十四天之上也又云大清境太極宫即太上老君位在三十三天之上也又云佛者西胡得道位在三十天延真宫主此即罽賓王是也三十二帝者按無量度人經云一曰鬱繿玉明二曰須阿那田三曰元育齊京四曰劉度內鮮五曰醜法輪六曰恬懀延七曰正定光八曰曲育九昌九曰理禁上真十曰空瑶醜音十一曰重光明十二曰摩夷妙辨十三曰阿迦婁生十四曰鬱密羅千十五曰龍羅菩提十六曰宛黎無延十七曰開真定光十八曰婆婁阿貪十九曰招真童二十曰薩羅婁王二十一曰閔巴狂二十二曰明梵光二十三曰勃勃監二十四曰飄弩穹隆二十五曰慧覺昏二十六曰梵行觀生二十七曰那育醜瑛二十八曰龍羅覺長二十九曰總監鬼神三十曰眇眇行元三十一曰運上玄玄三十二曰大擇法門通前三十二天並是諸天隱諱諸天隱名者也四方各配八天八帝四八所以為三十二天三十二帝三十二牢獄者按趙文和傳云三天曹門下獄北極司録門下獄北辰主命門下獄將軍太歲門下獄太陰太陽門下獄司空土府門下獄五部土公門下獄宅中真官門下獄諸寒溫竈君門下獄東嶽太山東門下獄南嶽衡山南門下獄西嶽華山西門下獄北嶽恆山北門下獄中央嵩山中門下獄二十八宿三十五宫中門下獄雲中三十六魁門下獄河伯九江水帝門下獄十二河平候中帝門下獄北帝鹹河門下獄北酆二十四獄門下獄杜稷府君門下獄川神符廟門下獄流殃刑搗三栗門下獄十二刑搗門下獄大耗小耗中官門下獄三丘五墓十二冢訟刑殺門下獄拘形破殺中官門下獄正王簡十二曹中門下獄延命生算門下獄十二月建中門下獄十二禁忌門下獄十耆中官法曹門下獄尋按天師一千二百官章辭奏詣此獄明用分别治病人身之難莫令諸失即無得橫自然安穩長壽解脫至老之也三洞珠囊卷之七
