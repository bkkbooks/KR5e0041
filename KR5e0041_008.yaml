body:
  text: 大唐陸海羽客王懸河修相好品上真始生變化元録曰元始皇上丈人頭戴九色之雲丹錦百變之光丹紫二色之雲坐九色之龍也又云皇老三天丈人項負十二相輪身有黃金之色也上清九真中經內訣云中央黃老君日暉重曜連光映虛五雲醫蓋慶煙玄淳也小劫經云通身黃金體頸有七寶圓光足躡蓮華行也老子自然齊儀云老子曰道無不在玉姿金相妙絶諸天天人共仰存想之也三道順行經云七寶之精化為七星七童子有七曜紫暉之光也大劫上經云素黃君入洞穴中見一真人光蓋明耀形長一丈六尺項有圓光通身七寶衣也又云上皇上古真人七十二相八十一種好又云手耀六度淵含笑相好歸也雌一五老經云黃素元君諱圓華黃刃字太張上形有黃金之質也三皇經云北方之人紺青色髮皆長八尺也八景經云服降生神丹者即頭生九晨之光面有玉華飛映寶曜也二十四生圖云飛天普金容也大洞玉經三十九章注云金仙者仙人色體如金光之映也老子十六變經云一變之時生在東方身青慈父姓海母姓江也三變之時三十六色綺羅文四變之時額上參午偃月十二行兩手不開把文章太真科下云太上虛皇金闕玉帝最尊最貴無生無死湛然常存玉貌金容妙相特絶也五千文十緯經第五云天尊放眉間之明珠照曜天下也太洞真經云玉清文始東王金暉仙公號曰玉皇道君項有圓光體生寶曜朗如日晨手把流鈴足躡七元仰眺太元俯指絶空九章八難義云諸天相好者長眉高耳骨鼻方瞳蒼腎綾文丹心錦胇也醜人相好者鶴背龜膺頭鹿面魚口鳥喙羊鼻馬頰鹿頸雉筋鴨趺猪腳也九章仙相義云青肝紫絡蒼腎綾文也背志河魁者背上有黑志如北斗形謂之河魁也眼有四規者眼精有方瞳圓見也齒牙三齶者齶刃也齒之與牙皆有三峰之刃也眉角有上千雙理者兩眉角有文雙千與上向頭也順文成郭者以眼為城郭也各有橫文順隨於眼也耳後伏晨者耳後有骨隱起見於外謂之伏晨也仙人劉京曰目瞳正方此千歲人也無量經云玉眸詵詵也本際經第三云太上道君叩齒含笑九色寶光從面門出照天師身吐柔軟音以告天師也珠韜玉札及西升中胎與復命胞并金簡內經說老子相好者身長八尺八寸黃色美眉長耳大目廣顙疏齒方口厚脣額有三五達理日角月懸鼻有雙骨耳有三門足蹈二五手把十文玄妙內篇云玄妙玉女夢見流星入口因而有娠八十一年而生老子上元經云李母晝卧見五色珠形如彈丸自天而下因乃吞之即便有娠老子十净供經云真人三十二相八十種好項負圓光光皆五色顯照净明也太玄部第八云轉輪得神仙緣我改心精受報無窮量志定入福庭三十二相好皆從身中明項負七寶光照曜諸天形九章云天尊面放五明之色釋云五種智慧之光欲救五道衆生亦云五德之威光亦云欲照五方國土也神仙傳第二云若土之相也深目而玄準準者鼻也鳶肩而長頸豐上而殺下也彭祖之相者面生異骨體有奇毛神仙傳第三云王遠字方平黃色少鬚長短中人也又仙人麻姑侍從女子可年十八九於頭中作髻餘髮散垂之可至腰也神仙傳第四云太陽女者色如桃花口如含丹肌理光澤髮膚有如十七八者太陽子者雖鬢髮斑白而肌膚豐盛面目光華也太陰女者飲神光之水身登王子之魁體有五行之寶芝也又孫登者止山穴間被髮自覆髮長一丈許神仙傳第六云八公化成十五童子露髻青綵色如桃華也神仙傳第七云劉根者字君安京兆長安人深目多鬚髮鬚髮皆黃長二四寸也身毛長一二尺神仙傳第十云李根字子源兩目童子皆正方也按仙經云八百歲童子方也東郭延年者山陽人也服靈飛散能夜書在暝室中身生光光照左右也登真隱訣立功品云生而青骨通神接真上清六甲內經云六甲旬中玉女並頽雲三角之髻餘髮散垂下至腰也無量變生經云太上身體金色面有紫光也太洞玉訣云金華仙人飲流霞之水則五藏明徹面生紫雲漢武帝洞冥記云仙人邊伯子食海中菱芰骨輕身生毛羽也邊字或作鳧字也上清命魔經云太保真人足排七度手乘天機顛蓋玄辰合逮二儀八素經云服日月之精者體映玉光面發金真又云面有玉澤體生金光又云面有金容頭生紫光又云項生紫光面發金容又云三門啓機九户受靈面發金容五藏華榮金真咸暢豁落洞明神灼潜照寶光夜生三九素語玉精真訣云面發金容五內華生玉藏保氣神仙道成玉帝七聖玄紀云西華之女金晨之童曜雲姿於瓊側含金容於蘭房又云神奇異毛紫胞玉絡也又云流精紫光內映外纏寶藏金容三元玉檢經云紫素元君頭建太真晨嬰之冠三角髻餘髮散之垂腰也又云金骨玉髓玄名帝圖也三道順行經云通身光明面生青暉之精也飛天綱步地紀經云西靈神童面有玉華也又云南真靈妃紫靈嬌女面有金碧龍華也又云關令尹喜項生寶明之光七十二相映照一形又云尹喜心結紫絡面有圓明項帶承天背負七元也老子雜說云尹喜眼有日精姿形長雅垂臂下膝堂堂有天人之貌又云頭負圓耀五藏有文面有七星上象天文下順地理莫不備足也金根經云青要帝君面發金容體生靈符七十二色洞映玉形三晨纏絡六氣齊并又云金骸玉骨名書帝籙又云面有玉精體生紫光又云太陽女面生金光也又云玉靈子項上恆生紫光洞照十里中兩目有流精如星玄映面發金容夜灼虛明又云九成公者九天丈人目圓口方聲如雷震項有紫光映照十天洞徹太元大有經下云玉清之母姓廉名銜頭戴七色珠玉之結結音髻又云上清女姓厥名四頭戴玉寶飛雲之髻又云太極帝妃姓玄名虎頭戴七寶玄雲之髻又云太上君后姓遷名含咳頭戴九玄玉精頽雲之髻並戴冠冠名在衣冠品中也大有經上云奇毛異質金骨玉名又云絳宫玉童頭作三角雲髻常陽玉女頭作飛霞髻戮雲仙童頭作三建雲髻赤圭玉女頭作頽雲髻也又云赤子歡悅真靈下降面發玉澤體生奇光洞徹幽微玄母八門經云左紫素元君右白素元君中黃素元君項上各有一寶曜日氣九色圓光朗徹金華洞房存此之光名為三素雌一真華練景或曰玉晨三素日灌形也玄母八門經云仙人趙成子面生玉光玄髮軟澤也大洞經下云骨有五帝之玉暉面有流金之浩泉如此皆天仙之相也玉清隱書云太微帝君進拜於帝皇之几憑瓊顔而妙感仰靈眸而陳詞也又云誦玉清隱書萬遍既周則身耀金晨也大洞玉經注云上皇真人項負寶耀圓光也神州玉章云圓華耀太暉黃老治中真也大洞玉經注云仙人色體如金光之映也登真隱訣第四云司命目有流光面生玉澤又云太極真人神光內曜朱華外陳體生玉映也真誥第二云服九轉丹面色似靈雲也真誥第七云仙人劉平阿顔色如玉也又司馬季主服明丹之華挹扶晨之暈得道在大有宫中顔色如二十女子鬚長三尺黑如墨也上清九真中經內訣云服八景四蘂五珠絳生神丹者頭生九晨之光面有玉華飛映寶曜洞觀天下也取八景丹滓搗日服一丸如小豆身生玉光壽同九晨體香聞三十里大洞經中卷云帝一體生六色曜金映流神形太洞真經云人之一身自無寶骨緑血又五藏無金玉之神光者則雌一帝一之道不可聞見也又云兆體自無朱雲之液玉和之氣發玉華於泥丸之內元鬱太素之精於絳宫之內森瓊林之柯於命門伏九舞之羽於太極之上者則大洞真經不可聞見也若兆無此相好者上帝不令授子矣又云九光映形洞照一身身體五藏萬關朗然也化胡經云老子體有金剛七十二相頭髮紺青色面目紫輝金色面有五色光也七星移度經云願我身生萬怪七十二光奇毛異骨飛羽衣裳乘虛駕空出入帝宫衆慶來臻萬壽無量也又至道七十二相具足則白日升天者故靈寶三部八景云二十四相在上分者一者兩目有雙光二者兩眉如初生雙月三者髮如紺青色四者頂生雲髻如紫金印五者頭頂四圓六者頭部上圓下方如紫金山七者天中光起八者金華分中有七寶光九者玄丹分中有雙天柱十者太皇分中方如玉璽十一者明堂分中圓如車輪自然白毫十二者洞房分中有紅暈紫絡十三者泥丸分中金精流液混合萬端十四者兩耳如金城郭十五者面如紅蓮圓如滿月十六者睫如雙皇太微十七者兩目臉如雙月上弦眼瞳清徹緩而不瞬十八者兩耳後如北斗柄十九者鼻如金柱具三窗二十者口如丹朱咽內三處津液流出具足無量微妙聲音二十一者通骨軿齒二十二者舌有金流廣長覆面二十三者頰如師子頤如印科二十四者頭如天柱具足三要靈寶三部八景二十四相在中分者一者心具九孔孔有九毛二者胸前如重文貝萬輻相輪字相分明三者正身平立兩手摩膝四者兩腋下平滿如樞星五者身相如璇璣六者心左如太光宫七者心右如太玄宫八者腹垂如懸盤九者臍如靈寶珠十者臍一具足三要十一者龍顔鳳姿十二者陰相如蓮子十三者背平直如騰雲十四者背左如東華闕十五者背右如西靈闕十六者坐如蹲龍十七者倚如牽牛十八者行如鳳翔十九者髓化成骨骨如盤龍二十者華顔玉質二十一者金暉紫貌二十二者兩乳如𩵄魅二十三者兩乳下如南辰二十四者通身紫色紅暈曜日靈寶三部八景二十四相在下分者一者兩足平滿如雙輪闕二者兩足下具千輻輞輪相三者兩足下策如天河四者兩足指長合縵綱具足五者兩足下有蓮花相輪登六者兩足跟具足滿好分明七者兩足趺高平好與跟相稱八者兩足踝垣然九者兩脛如雙柱十者兩膊如覆金船十一者一孔一毛首色柔軟右旋十二者兩膝珂如魒星十三者兩膝內如騫實十四者兩膝外如騫花十五者膝上如玉匣十六者股如雙玉軸十七者兩股內如玉衡十八者兩股外如金梁十九者兩股上有玉光二十者兩股通有雙骨如盤龍二十一者金骨玉髓內外洞見二十二者通身廣長力如金剛二十三者色如紫金不少不乏二十四者通身明净洞照十方多諸智慧玄覺未然三界九道一切蒼生常願聞見也夫大乘萬行圓滿具足七十二相斬來人間超然白日升天成無上至道萬仙之宗衆聖之尊故觀身智慧大戒經云晃晃金剛軀超超太上仙故曰道中之道仙中之仙三元經云元頂無巔元極無窮普察無量洞明最上正真冥寂玄通大智慧源若不具七十二相皆悉滅度更寄人間更修功立德從微至著然同七十二相超然白日成無上道理無二乘故曰真一元始大道故三元玉檢經云身洞紫虛神映金顔七十二相朗曜太空也法輪經云身得金剛七十二相項負圓明洞映大空位登高仙又云三十二相好皆從身中明項負七寶光照曜諸天形老子七十二相八十一好者老子有九變老第一變身長六尺六寸冠魚鵲冠八緣鳳衣第二變身長七尺七寸重疊冠白衣赤領赤袖第三變身長八尺八寸通天冠服五綵之衣第四變身長九尺九寸辟邪冠服羅袿衣第五變身長一丈三寸龍蛇冠著朱光之衣第六變身一丈七寸虛無冠著黑毛羽衣第七變身長一丈一尺元氣冠著龍蛇衣第八變身長一丈一尺五寸百變冠服自然衣其老子第九變之時身有七十二相應七十二氣八十一品也七十二相者頭圓法天頂象崑崙伏晨盤鬱玉枕徐起皓髮如鶴長餘七尺虎髭龍髯素潔如絲眉如北斗色如翠緑中有紫毛長餘五寸耳無輪廓中有三門高平於頂厚而且堅兩目鏡徹日精紫光方童秀朗規中緑筋鼻有雙柱形如截筒口方如海脣如赤丹氣有紫色其香若蘭齒如含貝其堅若銀數有六八上下均平舌長且廣形如錦文玉泉充溢其味甘香其聲如金其音如玉頰似橫隴頤若阿丘籠籠日角隱隱月懸犀文直理龍顔神變金容黃色玉姿潤顔額有三理參午上達天庭平填兌面壽徵腹有白痣頤有玉丸項有三約鶴素昂昂垂手過膝手把十文指有玉甲身有緑毛背有河魁胸有偃骨心有九孔外有錦文臍深一寸腹軟如綿腳方如矩雙躡法輪足蹈二五指有乾坤內滋白血外示老容身長丈二遍體鮮香行如虎步動若龍趍此是七十二相也左扶青龍右扶自虎頭生朱雀足履玄武身若金剛貌若琉璃圓光五明頭上紫氣胸前真字此九好兼前七十二相合成八十一好也金書仙志真記及後聖九玄道君列紀並云青童君曰夫有骨籙則好仙好仙之人皆有其仙志仙志之人或疲或篤也疲則先世善功不足也篤則玄籙宿命將定也大都天籙顯於玄宫則氣候𧦽於軀形籙字彰於太極則心神正於丹房若生有金闕玉名者則其人眼有日光青齒白血其為人也則仁慈而樂仙明穎而秀挺若上清有金書玉籙者則其人背志如河魁胸前有偃骨其為人也恭和而下人德及昆蟲若太極有丹間青文者則其人手理有纍人倒大之字其為人也密慎而好真清虛而容非若方諸有玄素紫名者則其人眼四規中有紫光照鑒其軀此為人也修業淵妙清淨避穢若雲房有玉緯內書者則其人圓眼方觀龍口細舌其為人也豁心體真監分明决若朱宫有丹字紫名者則其人鸞行鳳躍臍宫光澤其為人也竦於間生開心蕩濯若太清有玉籍編名者則其人聲有玉音金響口方目圓其為人也弘施博愛親人如母若太素有瓊簡金名者則其人必白志見於腹口中有紫氣其為人也慈德而通神潜仁而下衆若南極有丹文紫籙者則其人頭生五氣上接重樓之雲其為人也和仁而愛窮賑厄而濟難若斗中有玄玉籙籍者則其人心中有九孔肺外有錦文頤下有玉丸目中有緑筋眉角當上有干雙理順文城郭秃鬢露顙明堂平白干理為通真之津廣顙為受靈之宅其為人也慈愛窮賤仁及鳥獸若玄宫上元有青金赤書者則其人丹心紫孔黃華繞骨口中氣香齒多玉液其為人也少好視日月之流霞樂星辰之光景質清骨堅精誠深密若玄都丹臺有白玉金字者則其人青肝紫絡蒼腎綾文玄膺精溢形净神潔身體香軟血清氣澤其為人也耽存玄遠味景靈質好惠下已救施厄苦若三元宫有琳札青書者則其人紫腦錦舌玄志鬢際緑腸朱髓方足圓額陰有仗骨軟髮紫澤孔門三闕起居似澀眼有流光青精凝液掌文四菌齒牙三齶其為人也靈心仁愛慈感發神好微敬信樂林與春愛水清流懷感山川願投名阿保魄養魂志凌清泰遠慕天仙諸有如此上十三形悉皆上相必得上仙亦可學而得亦可不學而獲其次鼻上有玄山玄山者鼻上有黑志是也又當使腹上有玄丘對玄山也玄丘者亦黑志也若闕其一皆不合仙相若口臭而性耐穢者都壞玄山玄丘之相矣其次青骨青骨者其為人也皆樂聞五香之氣好學神靈之事其次鶴行龍趍項生玉枕耳後伏晨脅下有青志體生絡文及心真膽靜耳堅氣寬此皆次仙之相也高上虛皇君道經第一云羽衣命仙骨有玉映血成瓊泉生樂天地日月同年內音玉字下云玉眸者流火之膏也既受赤明和陽天中流火而鍊體生玉光絳府充盈萬神並歸紫度炎光經云太上大道君遊宴之圓光上激九天之威下滅六天之凶玄光虛映道君之頂流照八極四十萬里也龍飛尺素隱訣云身生寶曜項負圓光大洞雌一篇目云金姿曜於東華玉形蛻於帝門神映五老騰躍三元靈羽披空氣浩慶雲又能身生水火放光萬仞項負寶曜浮遊九晨分形散景位為上真又云玉童玉女面上皆有玉華金晨之光映曜一形四極明科云項生圓明映照十天也又云得此上清隱書目有回精面生紫容又云歸童日暉虛生之章目有回精流光之瞳上清變化七十四方經云南極長生之君王易度面發日精目生電光也又云三天玉童項有圓光體生玉精手把景雲足踐七元又云骨化結玉仙容華盈神州七轉七變經云紫晨君面發金容體映玉光五色紫章七十二變精耀玉顔也又云能行神州七轉舞天之道則體發金光面映金容七星絡軀乘雲升晨金璫上經云目明徹視洞睹幽窮面有金容體生玉津又云面有玉澤體生奇光內外洞朗也外國放品經云青童君頂生寶光映曜十天也裴君內傳云清靈真人裴君字玄仁少為人清明顔儀整素善於言笑目中有精光垂臂下膝聲氣高徹呼如鐘鳴也又云目中有珠子正似北斗魒星自已下象如河魁此神仙之志也本行經云阿丘曾衆好備發三十二相洞映女形也內音玉字上云凡修飛仙之道體生玉光也五符云皇人身長九尺玄毛被體皆長尺餘髮才長數寸居在峨眉北絶巖之下大洞玉經三十九章注云上皇真人頂負寶曜體映圓光氣合三素靈洞五藏也洞房內經序注云仙十相者第一生有金格玉名第二大玄宫有素籙第三左手有大字第四背有青志象如河魁第五身有七星志第六頂中有紫光自照見其體第七鶴行龍趍身體絡文第八心中九孔肺下青穴第九頭生五氣上接重雲第十玉聲金響口生紫氣若生有此者不須學道期必仙也奔日月二景隱文云高皇玉帝承玉虛皇流之胃瓊骨金髓鳳腦龍胎也上清真文玉經朝文云眼有玄光口有玉漿鼻有玉火耳有鎮神心有九孔上道九天足有八史上造天門坐起眠息玉童執言北斗七星常在胸前也道學傳第四云范材者白晢而美髮秀眉明目也三皇醮儀云令臣等得仙身生紫絡羽文也道學傳第七云陸修靜字元德吳興東遷人也及生之日跖音隻有重輪足有雙踝掌有大字身有斗文也第八卷云陶弘景字通明魏郡平陽人也神儀端潔形長七尺二寸頭聳耳高兩耳各有十餘長毛右股內有數十黑子多作七星文眼中見有奇異光象也第九卷云薛彪之晋陵人也服御衆蘂年高色少鬚髮緇潤也列仙傳云偓佺者槐山採藥人也好食松實形體生毛長數寸而目更方能飛行逮走馬也又云陽都女者都市上沽酒家女也生而眉連耳細而長衆以為異皆言此天人也以妻鄴人犢子犢子與之俱去入山焉列仙傳下云寧先生毛身廣耳被髮也老子道德經云頭髮茂盛得道之根手足汗津精氣充盈晝夜不卧日月合光不饑不渴龜龍胎息也本際經第四云太上道君以他心智及宿命通無礙道眼遙觀宿因淺劣所悟未真也四極明科云若有玄名帝圖紫簡録字玉藏金骨之人千年之內得三傳大洞真經也又云九真中經祕於太上六合宫中若有青書東華玉字上清藏生紫絡之人七百年內聽得三傳也又云太丹隱書藏於太上六合紫房之內若有金名帝圖緑字紫骨合真之人七百年內聽得三傳也又云青要紫書若有金髓玉骨名書帝籙七百年內聽得三傳也太玄都右宫女青四極明科文云上清寶藏玉骨之人得傳四極明科也清虛真人王君內傳云王君諱褒字子登服龍明珠絳和雲芝草即身有金映項生圓光七曜散華流暉焕形也南嶽夫人內傳云夫人之質霄景高焕圓精重照鳳體龍骨腦色寶曜五藏紫絡心有羽文也太上八景經云服四蘂紫漿五珠絳生神丹者即頭生九晨之光面有玉華飛映寶曜洞觀天下騰空上造紫虛出入玉清寢宴晨房也又云飛步天綱祕於玉虛紫房之內若有金名帝籙玉札上清骨相合真之人七百年內聽得三傳又云三天正法祕於九天之上玉清金房紫户之內若有金名玉字紫藏玉髓之人七百年內聽得三傳金籙簡文經云閉眼存見體作金色項有圓光光如日象照明十方身中了然盡見內外也消魔真符經云有金髓玉骨五藏生華體發奇光名參青箱得見洞經紫虛元君內傳云景林真人語華存曰今視子之質霄景高焕圓精重照鳳體龍骨腦色寶曜五藏紫絡心有羽文是以形棲晨霞神交靈津也方協德太平理仙佐治挺應稱用才亦偉鑠夫人之任諒不虛矣太極隱祕寶訣經云太極真人曰夫人有仙真相好者其要在慈心觸物以輔相好然後得仙矣不能忍性容非仙相敗矣無上真人內傳云尹喜眼有日精姿形長雅垂臂過膝項負圓耀五藏有文面有七星上象天文下順地理莫不備足故寄惠鍊質逝生末劫當為貴真之長也諸天年號日月品三九素語玉精真訣云九天丈人三天玉童以上始元年天甲吉辰時加北維移度停軒三元齊景九帝回真登高上玉館紫虛之天三九素語披解靈關玉精真訣總御萬仙也三元玉檢三元布經云清虛元年元始天王於明霞之館太霄雲房下教三天玉童三元玉檢之經也又云清虛元年歲在庚寅九月九日上甲值辰元始天王飛齊上清宫告盟無上無巔無色無影無形無名無祖無宗無極無窮洞清九玄自然無數劫道授三元玉檢三天玉童使付後學有玄名應為上清真人者大洞經下云青龍元年太歲在辛亥九月一日夜受此大洞經三十九章於紫微王夫人也玉帝七聖玄紀回天九霄經曰中皇元年九月七日七聖齊靈奉回天九霄白簡青籙之經解其曲理也上清八景飛度經云九天丈人以建始元年歲在東維天甲吉辰清齊太空七寶瓊臺以金青盟天請受靈篇招靈攝魔豁落七元玄章也登真隱訣云混皇三年太虛上霄飛晨中黃老道君年七歲知長生之要上清九真中經內訣云中央黃老以清靈上皇六年生也七星移度經云帝君五願求仙上法者帝君常以九月九日十月五日三月三日四月八日七月七日此五願十會之時也上登太極瓊宫高上玉殿金室之內存五願於間宫希玄真以自降虛無啓以玉章金音暢於太空召五帝以衛靈度萬會於丹房故有感而致真真感發而降焉是其日當沐浴清齊入室燒香心拜四方正東向平坐東向者是當陽始暉之方也叩齒三十六通以念願云第一上願我生自然之氣氣中結成我身與三光齊倫長享無極之根二願我身常處太空之上瓊宫玉房之裏朝與玉帝同宴夕與玄母同几渴翕浪井洪泉玉芝饑納龍胎瓊腴絳樹赤子三願我身生萬瑞七十二光奇毛異骨飛羽衣裳乘虛駕空出入帝宫衆慶來臻萬壽無量四願與無俱生與無俱死死而又生生為帝王封掌十天總領群仙五願一切衆生已生未生同保日月三光有道之人七玄之祖上升南宫天下之福靡有不當四方五願並會玉堂次上願九玄扶養我身魂魄真神恆居我宫上通天仙下逮洞淵願天願地願風願雲願神五願一合定籍長生天降紫煙地衛五靈乘雲駕虛飛輦緑軿上造金闕進登玉清慶及七祖更受胎生上願五合長享利貞中願亦五願得道本根願陰陽願太空願太無願太玄上宴玉房與帝因緣遊眄生門披浪九天元父定籍玄母記年桃康結精保固丹田身騰金闕名書玉篇七祖解脫福慶來臻下願亦五願太虛願太有願太上願太真願神仙運身於五嶽之嶺飄飄九霄之際出入開關之裏移脫死户之外願天地為我父母三光衛我萬神守九源之孔靈降自然之氣八方五願舉響而會龍飛尺素隱訣云上京元年三月三日元始啓旦太真丈人忽感飛行羽經焕赫玉虛之庭亦出白羽黑翮之經上清變化七十四方經云上清總真玄籙南極長生司命君姓王諱改生字易度乃以太虛元年歲洛西番孟商啓運朱明謝遷誕于東林廣昌之域長樂之鄉也神州七轉七變經云元景元年撰上清寶經一通以封西域山中也玉珮金璫上經云上虛元年正月一日天元合慶甲子值辰元始天王與太帝君感得青鳥來翔口銜紫書以授此二君也至中皇元年三月一日庚寅天德值合之時元始於寒靈丹殿瓊臺黃房之內命五仙都披霜羅雲錦之藴鬱森之笈出玉珮金璫太霄隱書以傳高上玉晨太上大道君也又云昔上開元年九月一日有青鳥銜九天金書祕字以付西王母也隱元內文云中皇元年三月一日甲子天德值合之時上相青童君清齊空山也本行經云洪那臺以朱靈元年歲在丙午誕於丹童龍羅衛天洞明玉國朱霍之阿也金房度命上經云南極總司定録上真禁君以始皇元年歲在壬午七月七日中時於上禪無量壽天王國七寶洞虛鳳京紫臺瓊林之下請問天尊度命回年之訣至中皇元年以傳南極上元君萬始先生金闕帝君也老子節解序云老子以無極靈道元年七月甲子授關令尹喜五千文節解圖受以長生也文始內傳云老子以上皇元年歲在丁卯正月十二日丙午下為周師又云老子以無極元年歲在癸丑十二月二十八日日中授道德經上下二篇也又云以周無極元年歲在癸丑冬十二月二十五日老子之度關也今按二教要録云上皇元年乃是人皇君之年號也在周前一十七君年代極懸也或可周家象此以稱或可象天上年號也會似地皇君稱赤烏元年吳孫權亦稱赤烏元年也似元皇君號開皇元年隨家亦象號開皇元年是也靈書經云至上皇元年諸天男女形故純朴心漸殆壞恐至凋零正教不全是故我身國國之造成就諸心也據此即是諸天年號又非人皇君之年號看似人皇君象此以立年號也按九天生神經上皇乃是劫名在開皇劫前赤明劫後也上清變化七十四方經云南極長生君生于東林廣昌之域長樂之鄉也又云固神宫於幽府定保籙於元圖陽離北朔之鄉陰會金雲之州交二氣以變鍊合陰陽以相扶則元始勒命於南極三真書簡於東華宛轉反香之煙遊觀紫霄之崖滅死結於元胞補上真於幽都也又云上元真高上玉虛之氣結玉清金相宫瓊天府八明鄉定真里號為元始皇上丈八也又云上元上真高清元太虛之氣結玉清金簡宫太清府開明鄉通真里號曰高靈九天王也又云上元上真高玄元紫虛之氣結玉清丹靈宫開清府三合鄉元明里號曰玉真九天丈人又云上元上真高虛元洞虛之氣結玉清玉演宫金融府上開鄉正元里號曰皇老三天丈人又云上登上元真高眀元虛之氣結玉清瓊上宫丹明府三素鄉元正里號上三天玉童也上元上真高皇元六虛之氣結玉清啓金宫重賓府上合鄉六會里號曰玉寶九霄丈人又云上元上真玄上元玉皇之氣結玉清七映宫鳳生府上虛鄉化仙里號曰紫映九霄真王又云上元上真玄虛元上皇之氣結玉清元寶宫金上府離合鄉明光里號曰高上虛皇君右此上清變化七十四方經鄉里之名大有文多此不具録神州七轉七變經云紫晨南造朱陵太丹極炎流火之鄉南極上元君請太丹之瓊章又云北造羽陰九玄寒鄉太陰玉晨九元真妃來受流精飛景寶章龜山元籙下云北玄高上空皇君在玉清紫瑶宫丹瓊府金相鄉三皇里中回真下映入兆兩腎玉户之口又云西華空皇君在玉清音元宫八坦府四明鄉極微里中回真下映入兆肺之後門又云東明虛皇君在玉清紫微宫朱雀府南陽鄉洞生里中回真下映入兆肝內九重之户又云中舍空皇君在玉清金靈宫鳳嘯府幽神鄉合清里中回真下映入兆脾府也右此元籙下經大有諸鄉名此不具寫也衆真戒第三云湯谷有建木鄉去會稽東方諸山六萬里也八威召龍經云上造玉京基下至淵洞鄉大洞玉經三十九章注曰東華者仙真之州也在始暉之間高晨玉保之所治也始暉者日出之鄉也又云玄洲有弱水之津非仙人而莫越焉道學傳第二十云張元妃字净明寓居曲阿蔡坡村年十一便能長齊也三天正法經有上皇先生也今看似老子以上皇元年下為周師者定是天上後之上皇也會似通門論上卷說云有前三元中三元後三元以相為例是也似玄門論第七引洞神經第六云有前三皇君有次三皇君有後三皇君之相似也似梁朝象道家太清境亦稱太清元年也分化國土品第一卷應道降生品亦有分化語洞神經第八云耶泥天下廣長八十一萬里地形如却月內音玉字經下云天尊與五老上帝十方大聖同於赤明世界柏陵舍中說大梵隱語無量洞章天書八會之字天尊有命諸天敬從於是四衆同起作禮天尊舉手指上俯手指下無上無下無極無窮無深無遠無幽無隱無大無小無數無終一切普度同更光明彈指告衆一切咸聞是時四衆同時抗手仰天彈指三十二天日月星宿一時俱明地下九幽無極之底光影洞徹無復暗冥幽隱普見地藏露形山川溪澗一等緬平冬華結實枯樹發榮慶加一切功戴衆生魚龍踊躍鳥獸欣鳴靈歌交會路無悲聲天靜地默三官潜寧簡對休息五道不生人神歡泰聖道太平五千文十緯經第五云多羅真人化行中國震旦之地震旦之地名曰閻浮閻浮人惡愚頑衆生多不信真經又分形化乎三十六國又化奈全國王國王留之委任國政國王一一從五千文三洞之法也升玄經第八云吾以五氣周流八極或號太上或號老君或為玄宗或為世師升玄經第三云中有見形為國師者中有見形作儒林之宗者中有見形執禮律者一日之中周遍十方不可以凡愚形質限量聖人也紫青金根經云青要帝君降生姓堯字伯淵棲心明霞之境放浪玉國之墟執持元皇之策落景九域之丘又云元皇玉帝登九老仙都之京九曲之房遊覽無涯宴樂九天又云九成公者九天丈人乘飛鳳玄龍遊於白水沙洲空山之上金根經云玄丘玉國無涯之天溟濛九城之濱青要帝君所誕生處也三洞珠囊卷之八
