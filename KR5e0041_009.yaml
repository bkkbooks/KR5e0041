  text: 三洞珠囊卷之九懷九
  hash: sha256:7f4b01187b95685c6059ab041bc8e76453cfd9c7ba5fa00dfa427e2684820dbd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_HFL_009-001a, image: hfl/0782/0782-072.png}
body:
  text: 大唐陸海羽客王懸河修劫數品上清三天正法經云天圓十二綱地方十二紀天綱運關三百六十輪為一周地紀椎機三百三十輪為一度天運三千六百周為陽勃地轉三千三百度為陰蝕天氣極於太陰地氣窮於太陽故陽激則勃陰否則蝕陰陽勃蝕天地氣反天地氣反乃謂之小劫小劫交則萬帝易位九氣改度日月縮運陸地涌於九泉水母决於五河大鳥屯於龍門五帝受會於玄都當此之時凶穢滅種善民存焉天運九千九百周為陽蝕地轉九千三百度為陰勃陽蝕則氣窮於太陰地勃則氣謀於太陽故陽否則蝕陰激則勃陽陰蝕勃則天地改易天地改易謂之大劫大劫交則天翻地覆海涌河决人淪山沒金玉化消六合冥一白尸飄於無涯孤爽悲於洪波大鳥掃穢於靈嶽水母受事於九河五龍吐氣於北元天馬匡轡以徒魔赤鎖伏精於辰門歲星滅王於金羅日月昏翳於三豪之館五氣停暈於九嶺之上龍王鼓華於東井之上河侯受對於九海之下聖君顯駕於明霞五帝科簡於善惡當此之時萬惡絶種鬼魔滅迹八荒四極萬不遺一至於天地之會自非高上三天所不能禳自無青籙白簡所不能脫也又云天關在天西北之角與斗星相御北斗九星則天關之綱柄王晨之華蓋梵行九天十二辰之氣斗綱運關則九天並轉天有四候之門九天合三十六候一晝一夜則斗綱運關經一候之門晝夜三十六日則經三十六候都竟三十六候竟則是九天一輪三百六十輪為九天一周九天一周則六天之氣皆還上上三天天改運促會以催其度三千六百周則為小劫小劫交則九氣改正萬帝易位民亡鬼滅善好清治六合寧一九千九百周為大劫終大劫終則九天數盡六天運窮六天運窮則氣激於三五群祅凶橫因時而行放毒滅民此皆運窮數極乘機而鼓以至於此也地機在東南之分九泉之下則九河之口吐翕之靈機上通天源之陶注傍吞九洞之淵澳十二時紀推四會之水東回一書一夜則氣盈並凑九河之機晝夜三十三日機轉西北回東北張西南翕張則溢翕則虧周於四會天源下流涌波是為一轉三百三十轉為一度一度則水母促會於龍王河侯受對於三天三千三百度謂之陰否陰否則蝕陰蝕水涌水涌河决山淪地沒九千三百度為大劫之終陰運之極當此之時九泉涌於洪波水母鼓於龍門山海冥一六合坦然此陰運之克地氣之激也又云赤精開皇元年七月七日丙午中時登琳琅之都月之上館受符於元始天王開金陽玉匱玄和玉女口命出皇民録譜自開皇以前三象明曜以來至于開皇經纍億之劫天地成敗非可稱載九天丈人於開皇算定天元校推劫運白簡青籙得道人名記皇民譜録數極唐堯是為小劫一交其中損益有二十四萬人應為得者自承唐之後數四十六丁亥前後中間甲申之年乃小劫之會人名應定在此之際陽九百六二氣離合吉凶交會得過者將為免哉然甲申之後甲申之前其中壬辰之初數有九周至庚子之年吉凶候見其道審明當有赤星見於東方白彗干於月門妖子續黨於蟲口亂群填尸於越川人啖其種萬里絶煙强臣稱霸弱主蒙塵其後當有五靈昺瑞義合本根龍精之後續族之君平滅四虜應符者隆龍虎之世三六乃請民無橫命祚無危患自唐之後四十六丁亥是三劫之周又從數五十五丁亥至壬辰癸巳是也則是大劫之周大劫之周天翻地覆金玉化消人淪山沒六合冥一天地之改運真非所如何惟高上三天白簡青籙乃得宴鴻翮而騰翔飛霄而盻目耳此玄和玉女口命金陽玉匱論天地之成敗吉凶之是非也上清八景飛經云大劫之周三道虧盈二氣合離理物有期承唐之世陽九放灾前除凶勃搜採上真也老君戒文云西向流沙中無量國有巨石高三百丈周旋一千五百里巨石北則有芥子城壁方四十里四面石壇高二十丈飛仙一歲送一芥子著此城中以衣拂巨石令消者與平地無别芥子城令滿中芥子則時運周劫世轉一階也靈寶齊戒威儀經訣下云石如崑山芥子四十里中天人羅衣百年一度拂盡此石取此芥子一枚譬如一劫之終若是之久誰當悟斯者也靈寶天地運度經云靈寶自然運度有大陽九大伯六也小陽九小伯六也三千三伯年為小陽九小伯六也九千九百年為大陽九大伯六也夫天厄謂之陽九也地虧謂之百六也至金氏之後甲申之歲是其天地運度否泰所終陽九會至時道德方明凶醜頓肆聖君受任於壬辰之年也又云至于水龍時仙君乃方起弓口十八子彼經中有十條此不具録也老子為帝師品太平部卷第八老子傳授經戒儀注訣云老子者得道之大聖幽顯所共師者也應感則變化隨方功成則隱淪常住住無所住常無不在不在之在在乎無極無極之極極乎太玄太玄者太宗極主之所都也老子都此化應十方敷有無之妙應接無窮不可稱述近出世化生乎周初降迹和光誕於庶類示明胎育可以學真雖居下賤無纍得道周流六虛教化三界出世間法在世間法有為無為莫不畢究文王之時仕為守藏史或云處世二百餘載至平王四十三年太歲癸丑十二月二十八日為關令尹喜說五千文也化胡經云老子伏羲後生為帝之師號曰究爽子復稱田野子作元陽經神農時出為帝師號曰大成子復名郭成子作太一元精經祝融時出為帝師號曰傳豫子復名廣壽子作按摩通精經三家共修無為各治萬八千歲致太平人民純朴無有餘治唯元氣自然為法不役伐道氣歸之無不服也此謂三皇之君矣黃帝時出為帝師號曰廣成子作道成經帝嚳時出為帝師號曰緑圖子作道理黃庭經帝堯時出為帝師稱務成子作正事經帝舜時出為帝師稱尹壽子作道德經黃帝至聖遂使帝業相承壽命有長短象之五行更相尅伐强弱相凌此謂五帝夏王時出為帝師號曰李子胥作元陽經復作德戒經湯王時出為帝師號曰錫則子作道元經文王時出為帝師號曰燮邑子復稱赤精子亦為守藏史武王時出為帝師號曰郭叔子復稱續成子為柱下史幽王時出為帝師號曰天老復稱老子為柱下史作長生經復與尹喜作五千文上下二經復與尹喜至西國作佛化胡經六十四萬言與胡王後還中國作太平經後世當在人間欲令世人修善行義尊奉德化以佐道法助國扶命憂勞百姓度脫凶年令遇太清之中也已上數懸河今謂道德序訣云老子代代為國師即此是也孟智周法師老子經通題目云千二百老子此即其數千二百老子自别有經也又云後學所成伯陽是也故知伯陽尊號始乎隆周也此號隱顯難可詳究矣玉帝七聖玄紀云亹亹神匠靈德虛鮮曜龍文於滄淵焕采雲於九天濯高貌於蘭玉發金精於瓊泉列七紀於上録明刻書於隱篇括致沉豪運轉滯輪採結五象携集上真實高上之垂化以敷教于群方也老子化西胡品太平經云老子往西越八十餘年生殷周之際也鬼谷先生撰文始先生無上真人關令內傳云周無極元年歲在癸丑冬十有二月二十五日老子之度關也關令尹喜勑門吏曰若有老公從東來乘青牛薄板車者勿聽過關在後果見老公如是求度關關吏不許以關吏之言白之老公曰吾家在關東而田在關西欲往採樵幸聽度之關吏再不許入白關令令即出迎設弟子之禮老公故辭欲去關令殷勤北面事之老子許之住也老子時有賃客姓徐名甲日雇錢一百老子先與約語當頓還卿直然須吾行達西海大秦安息國歸以黃金頓備錢限甲既見老子方欲遠遊疑遂不還其直爾時有美色女人聞甲應得多錢蜜語甲曰何不急訟求其直吾當為子妻甲惡意因成即舉詞詣關令訴老子求錢關令以甲詞呈老子老子曰吾祿貧薄無僕役前借此人先語至西海大秦安息國歸頓還黃金備直限其何負約見訟耶甲隨老子二百餘歲應還七百萬老子謂甲曰吾昔語汝至西海大秦安息國歸頓以黃金相還云何不能忍辱今便興詞訟我汝隨我已二百餘歲汝命早應死賴我太玄長生符在爾身耳言畢見太玄長生符飛從甲口出還在老子前文字新明甲已成一聚白骨喜既見甲違心便死意復欲觀老子起死人因曰喜當代還此直即具錢來伏願赦甲往罪賜其更生老子愍之曰善此本非吾瞋甲甲負先心道自去之老子復以向符投其枯骨甲即還生如故喜具為說之甲方叩頭謝罪老子令還汝直謝遣之也老子以上皇元年歲在丁卯正月十二日丙午下為周師也周道將衰王不修德弗能以道德治民此淫亂之俗不可復師故微服而行吾將遠遊矣喜復作禮曰願大人為我著書說大道之意喜得奉而修焉老子以無極元年歲在癸丑十二月二十八日日中作道德經上下二篇以授喜老子辭别欲行喜曰願從大人遠遊觀化天地間可乎老子曰我行無常處或上天或入地或登山或入海或在戎狄蠻貊非人之鄉鬼神之邦嶮難之中觀化十方出入無間坐在立亡子以始受道諸穢未盡焉得隨吾遠行耶子且止誦此二卷經萬遍道成乃可從吾遠遊子道欲成時自當相迎今未得去也老子臨去則告曰子千日以後於成都市門青羊之肆尋吾乃可得矣喜奉教誦經萬遍千日之後身乃飛行入水蹈火並不熱溺今道已成乃往成都市門青羊之肆尋老子經日不見盡夜感念到九日見一人來買青羊由是乃悟問使人曰子何故日日買此青羊耶使人答曰吾家有貴客好畜青羊故使我買之也喜曰吾昔與彼客有舊因期於此子能為我達之不因以珍寶獻之使人曰諾君但隨我去當為具白此意喜曰若然白客言關令尹喜在外使人如其言白之老子曰令前拂衣而起登自然蓮華之座問喜曰别後三年之中子讀經何得何失喜拜而自陳曰奉教誦經令喜得常存不死也老子曰子昔願從吾遠遊道已成可以遊觀大地八紘之外也喜曰弟子宿願始申矣無復所恨老子於是命駕遠遊天地之間變化諸國也後入罽賓國闍崛之山精舍中行道罽賓王出遊問曰此何等人侍者曰道士耳王曰道士乃幽隱在此乎後日復遊見之王曰何修也可以致福老子曰齊戒中食讀經行道上可得至真不死不生教化出入在意也下可安國隆家亦可從轉身得道度世入無為王曰善哉後日出遊復見之王曰道士道法最何為貴耶道士曰吾道貴自然清靜無為及齊戒行中食燒香可從生天可從生王侯家得可從道度世以此為上王曰善寡人欲請道士中食行道可乎道士曰為欲請幾人耶王曰悉請也道士曰徒衆多難可悉供也王笑曰寡人大國何求不得而云不能供耶道士曰吾道士固曰貧道依附國王致有珍寶盡是王物今先欲請王國人中食以為百姓祈福可乎王曰善但恐道士無以供之道士曰足有供之願王枉駕王曰刻日當到道士遂先請及群臣國人也皆使仙童玉女及四方飛天人請男女一十四日都畢王歎曰貧道士尚能作大福如此我大國王何所乏無而言不能供之耶刻日請道士徒衆大會道士到皆引諸天聖衆九品仙人四十餘日人來不盡後方日日異類或胡或傖或吳或楚或長或短王倉庫已半人猶未止王曰如道士言此人衆何其多吾誠恥中殆令無供具忽生惡念曰吾恐此老公是鬼魅非賢人道士可速收縛積薪市中燒殺之以示百姓於是遂縛老子徒衆等老子爾時任其所作聚薪都市老子語喜及諸從真人卿但隨我上此薪上傾國人悉來視之終不能害我等也如是國人視之其善心者皆難吒我王何故强請道士而中道燒之可憐可念火起衝天國人因見老子亦放身光滿天下老子與喜及諸真人在炭煙之中坐蓮華之上執道德經詠之及火勢盛猶在炭上坐不去王問老公已死耶使者曰老公故在炭上誦經王又令沉老公深淵後隨王入淵入淵不溺國人見老子放光神龍負之龍光亦照淵方誦經並不能為害王問道士等已死乎使者曰投之深淵龍王出負之老公放光照滿國內復不死不溺當如之何王曰燒之不死沉之不溺吾末如之何王顧謂群臣曰恐彼老子將天師聖人乎今欲事之何如群臣曰善恐老公徒嗔將亡國也願王卑詞謝之王曰正爾自詣却說前事謝罪云云老公曰前我語王恐王不能供之云云而反燒我師徒何逆天無道耶上天不許王之橫殺無辜此乃天見我無罪故得度險難也天將滅王國不久當至也王大謝罪願舉國事師不敢中怠老子曰王前有惡心今雖叩頭千下猶未可保信恐後有悔當何以為誓耶王曰今以舉國男女一世不娶妻髠鬄鬚髮以為盟誓約不中悔中悔當死為證何如老子曰善爾時推尹喜為師令王及國人事之王當以國事付太子伊梨我當修道捨家國求道度世老子曰善既欲棄國學道吾留王之師號為佛佛事無上正真之道道有大法若王居國學道但奉五戒十善自足致福去却不祥常生人道尊榮富貴亦可因此得道度世何必捨家也王及群臣一時稽首師前男女同日奉道焉為作三法衣守攝其心錫杖以驚蛇蟲乞中食為節老子復為造九萬品經戒今日就誦之老子曰授子道既備吾欲速遊八方遂還東遊幽演大道自然之氣為三法第一曰太上無極大道第二曰無上正真之道第三曰太平清約之道也老子化胡經云吾以幽王時出為師教化道法觀其虛實為柱下史姓李名耳字伯陽知幽王不可復師欲去之此衰亂之俗不可久周幽王將亡其國乃假服乘青牛薄板車去之於是幽王果為大戎所殺遂西詣罽賓王至函谷關關令尹喜好道術內學仰知天文下知地理預知道當西行夙夜觀象是時太歲在癸丑十二月二十五日臘除道過來西度關關令尹喜先勑門吏今日當有老公乘青牛薄板車來度關告之勿令去如其言老子乘青牛薄板車度關關吏留之不聽度老子云貧賤老公居在關東田在關西明日當臘欲去取薪草幸聽度吏下而跪啓曰明府有教若有老公乘青牛薄板車留之勿令去願少留神吏便入白關令關令帶印綬執板而迎為設禮老子曰吾是貧賤老公居在關東田在關西明日當臘欲往迎薪草耳令留如何尹喜執板跪而言曰喜是蜀郡成都人姓尹名喜自生以來至今以歷三千甲子也求先生當周旋勞苦暴露天幸今日相遇願少留神老子入舍共語三日三夜為作五千文主人上饌甚厚老子念無以報之為作五千文上下二經與之報其厚意辭别欲去尹喜曰願聞先生姓字老子張口吐舌示之曰口中齒皆落盡唯有舌在耳喜曰老聃齒在口中三十六枚儼然如霜齒今落盡唯有舌獨在故知柔者能制剛弱者能勝强欲令尹喜行柔弱之志竟不語姓字而去喜曰思道德之美願從西行老子曰吾遊越天地之表散氣於八嵎或至小國或上升天下入淵隨世教化無所不至子安能隨我去不尹喜跪而言曰入水入淵入地上天投身沒命願從先生老子曰子勤讀五千文上下二經却後三年會成都市青羊肆索我則可得也子今不得隨吾去矣於是太歲癸丑辭别而去尹喜遂修經夙夜不懈元氣歸其身日日加增得道之意知其真焉喜後以太歲丁巳詣成都市青羊肆索老子纍日積月不見夙夜歎息後乃見一人數數來買青羊於是心開意悟乃問之曰何以日日來買此青羊耶使人答曰我家有貴客好畜青羊故使我買之喜曰吾昔與彼客有舊因期於此子能為我達之不以珍寶獻之使人曰諾君但隨我當為具白喜曰若然白客言尹喜在外使人如其言白之老子曰令前拂衣而起登自然蓮華之座手捉九節之杖見尹喜言何以晚耶吾待子久矣喜再拜曰求先生纍日積月不知先生所向何許道不奪願今得拜見恩覆之廣深也遠矣於是乃共說三年之中何有可忘尹喜稽首言曰與先生别後所得經者晨夜讀之無有畏忘精邪鬼賊見喜皆自然化服萬神為之走知元氣之廣矣老子曰在此待子甚久知子不移之志當將子遠遊觀天地間元氣保子身形豈不善哉爾時太歲丁巳乃與喜至西國我欲教諸國人莫知之者至罽賓國乃入山中巖居穴處共修道法三年太歲庚申胡王出獵數數見之問左右曰此何等人也左右無能知者老子答曰我是老人積在山中王怪之謂是魍魅不知是聖人固欲賊害老子老子行柔弱之志以下其意乃設自然無極天厨欲請王國中人王聞之掉手大笑曰此老公依附吾國得自生活當何得請吾國中人耶老公曰依附王國以得生活致有今日今欲還東國欲報王恩刻日當會王遣使者視老公請客之具老公設五行雲氣之帳縵西谷中白縵北谷中黑縵東谷中青縵南谷中赤縵中央黃縵延請國王上及王身下及國人胡王即召三十六國數千萬人往會老子五色雲縵之中飲食七日七夜厨饌儼然不為勞倦胡王歸國復欲請老公老公答王曰言不可請王曰吾大國之中何所無有何以不能請老公耶刻日當會到其日老子與諸道士共行就請有四輩弟子四天王百萬衆今日一種人明日復異種人日日人各不同如此四十餘日人來不絶王厨已盡王乃大驚語左右曰此為妖𦍙必非常人奈何殺之左右曰可積薪都市中燒之若不死者取大石擊頭著海水中當不死之耶胡王勑國中户各取薪一束積與市上燒之老子與尹喜為胡王所繫薪上胡子於下放火燒之四十餘日薪盡火滅老子與尹喜在炭中讀經如故王復沉老子尹喜以大石繫頭著深淵之中又復不沒胡王大驚今當奈何舉國惶怖欲來侍老子以為師也老子語王曰我非師也前與我共上薪被燒者是為師師今到諸天中索兵馬當來以伐王國以王前燒殺之故也須臾間諸天鬼神兵馬來下皆長一丈四尺數百萬衆手持鐵杖滿王國中日日來之不絶唯欲以殺胡子并及王身故胡王大驚三十六國各各失魂王頭面指地不敢視老子老子即變作金剛五色大人身長一丈六尺七十二相面目紫輝見於虛空左入右出乍下乍上是謂十方空虛身也胡王驚怖語左右置向老公侍此大人耶老子知其欲化也此不為大人也此名太上正真之人耳此正真之人好生惡殺來至王國過不犯王王有何意積薪以燒之耶而今奈何復欲以侍之乃欲免耶胡王曰賜我生命濟活我國生死一心奉屬大人從今以誓不犯之也老子曰王當以何作信王曰我國中大小男女終身不娶妻當侍師至死求免我罪於是召三十六國胡子向老子前皆當髠頭剃鬚自毁形容橫裙衣露右臂與天為信引地為誓叉手合掌不敢移易老子見胡受化乃與作六十四萬言經無上正真之道令王舉國事法不得探巢破卵傷害萬物劫盜作賊侵凌孤弱詛罵妬𡜍飲酒食肉妄言兩舌不得載車乘馬不著履屨為作錫杖欲令驚地生蟲不得傷害之也又恐其變悔故為作三衣法服左臂露右臂常結著心前令以右手捉之不得放心也不令種作為刻木作拔音鉢以受七升令日月當行乞食家乞一升七家得七升得之便食之若至七家不得食自謫七日不食飲水而已以此為法化胡經乃有二卷不同今會其異同録此文出也時節品太一帝君洞真玄云白日登晨者日之正中為白日也雞之始鳴登晨也明真經云人之得仙白日登晨即此義矣皆取生氣時司命解化方云白日去謂之上尸解也夜半去謂之下尸解也向曉向暮而去者謂之地下主者也升玄第一經云朝中日沒人定夜半雞鳴為六時禮敬十方天尊禮從東方為始也玉清隱書云甲子之日八節之日此皆上元朝宴之時也上清八景飛經云立春之日三素元君上詣天皇太帝遊宴之時元景行道受仙之日也春分之日太微天帝君上詣高上玉皇遊宴之時始景行道受仙之日也立夏之日太極上真三元真人上詣紫微宫遊宴之時玄景行道受仙之日也夏至之日扶桑公太帝君上詣太微宫遊宴之時也虛景行道受仙之日也立秋之日太素上真白帝君上詣玉天玄皇高真遊宴之時元景行道受仙之日也秋分之日南極上真赤帝君上詣閬風臺詣九靈夫人遊宴之時明景行道受仙之日也立冬之日上清真人帝君皇祖上詣高上九天玉帝子遊宴之時洞景行道受仙之日也冬至之日太霄玉妃太虛上真人上詣太皇宫太微天帝君遊宴之時清景行道受仙之日也先録出在道例第九卷八節齊日品中具說之也三洞珠囊卷之九
