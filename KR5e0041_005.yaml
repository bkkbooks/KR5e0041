front:
  text: 三洞珠囊卷之五懷五
  hash: sha256:7fef0d6c42d154b8ff2d1dc9eb2eeea2db639763a72bee4e854f0f3dd021f629
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0041_HFL_005-001a, image: hfl/0781/0781-026.png}
body:
  text: 大唐陸海羽客王懸河修坐忘精思品南華齊物論第二云南郭子綦隱几而坐仰天而噓嗒焉似喪其偶也第六篇云墮支體黜聰明離形去智同於大通此謂坐忘也第四篇云支離其形役則不預又况更支離其德者乎又云無聽之以耳無聽之以心而聽之以氣氣者虛而待物也虛室生白吉祥止矣道學傳第二云張天師周流五嶽精思積感真降道成號曰天師第五卷引集仙記云劉凝之字志安小名長年南郡枝江人也奉道精進元嘉十四年於精思所忽覺額上慘痛搔之得寶珠九枚即泛以清水輝耀竟室于時臨川王鎮江陵求看寶珠即分三枚付信也道迹經云青童君曰夫精思者當先燒香於左右也上清八景經云精思百日真人降形仙人詣房與子共言賜子神仙之藥授子神真之道也葛仙公五千文經序云精思遠感上徹太上道君遣真人下授文帝五千文經希微之旨也又云靜思期真則衆妙感會內觀形影則神氣長存體洽道德則萬神震伏禍滅九陰福生十方安國寧家孰能知乎莊子大宗師篇云夫坐忘者墮支體黜聰明離形去智同於大通此亦是精思之義也又南華論齊物篇云南郭子綦隱几而坐嗒焉似喪其偶故行若曳槁木坐若聚死灰此亦是精思之義也登真隱訣云五靈道人支子元乃於靜室精思存五星在頭上歲星在左太白在右熒惑在膝中使鎮星在心中各見光芒氣色也久久行之出入遠行常思不忘無所不却也此五神因共人身則白日升天也裴君內傳云佛圖道人支子元裴君授以長生內術又云尋藥之與存思雖致道同津而關源異緒服藥所以保形形康則神安存思所以安神神通則形保二理乃成相資而有優劣之品今慮神漏而形棄是存思之為優未見形去而神留服藥所以為劣其有偏用能通者亦同臻道岸而未若兼善使藥與思交用形與神相入則指薪日續遊刃無阻生涯自然而立死地何從而來也真誥第五云凡人常存思識已之形極使髣佛對在我前使面上恆有日月之光照洞一形使日在左月在右去面前九寸令存畢乃啄齒三通微祝曰元胎上真雙景三玄右制七魄左拘三魂令我神明與形常存畢又叩齒三七通咽液三七過此名為帝君録形拘魂之道使人精明神仙長生不死若不得祝者亦可單存之也真誥第七云仙人張微子是漢昭帝時張慶之女也曾精思於寢靜誠心感處故得東海東華玉妃渟文期降之授以服霧之道也服霧之法始起於此又云括蒼山學道者平仲節河東人也受師宋君存心鏡之道如此積四十五年中精思身形更少體有真氣中央黃老遣迎乘雲駕龍白日升天今在滄浪雲臺也又云范伯慈者桂陽人也入天目山服食餌胡麻精思十七年太上真仙司命君下降授三十六卷經後服還丹白日升天今為玄一真人也太一金真記云昔有裴君止於崆峒山修行精思一年之中髣佛形象二年之中五帝乘日形見在君左右三年之中終日語笑戲樂五年之中五帝日君遂與裴君驂乘飛龍之車東到日窟之天東蒙長丘扶桑之宫八極之城登明真之臺坐希林之殿授揮神之章九有之符食青精日𥹋飲空碧玄神於是與五帝日君日日而遊此所謂奔日之道也上清變化七十四方經云若能精思於靜室棄纍風塵誠注太霞之觀目羅上清之宫定氣明於審止安神洞於太空則不旬日而睹神不移年而飛騰積感發乎一寸變璘鬱乎霄峰周覽極乎百圓化七十四方奇變之道福不可量皆神經之貴行寶訣之上仙也又云若能夷心於牀室思神顔於自然則氣達清霄澤流九津招靈景之幽華榮朽老以長存福慶銜於玄業元吉散於種親可謂生死享其祚祖考更生於胎仙大象之妙化巍巍乎靈文也自然經訣云閉目存至真精思降十老升仙永無為靈顔恆妙好渴飲玉池漿饑食金光草故陳先生修道會真必以精思為本存神入觀尅以靜念為先也長齊品太玄經第八老子傳授經戒注訣云夫齊供豐儉隨時施設大法清虛簡素為上也登真隱訣第四云季偉昔長齊三年誠竭單思乃能服日月光芒之液於是神光映身也真誥第五云凡甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席及言語面會清齊入室東向心拜存神念氣期感神明亦適意所陳也如此者玉女降侍也夫學道之士當先檢制魂魄消滅尸鬼常以月晦朔之日庚申甲寅之日當清齊入室沐浴塵埃正席而坐得不眠者益善以真朱筆點左目眥下以雄黃筆點右鼻下令小半入谷裏也點畢先叩齒三通微祝曰上景飛纏朱黃散煙氣攝靈邪尸穢沈泯和魂鍊魄合形大神令我不死萬歲永全聰明徹視永亨利津祝畢又啄齒三通咽液三過并右手第二指躡左目下各七遍當盡陰按之勿舉手也於是都按此二處是七魄遊尸之門户鉞精賊邪之津梁矣故受朱黃之精塞尸鬼之路二景之薰淫亂之氣也此太極上法常能行則魂魄和柔尸穢散絶長生神仙通氣徹視行之三年色念都泯也無量經云正月長齊誦詠是經為上世亡魂斷地逮役度上南宫七月長齊誦詠是經身得神仙諸天書名黃籙白簡削死上生八節之日誦詠是經為九宫真人本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清也真誥第八云辛玄子字延期隴西定谷人也漢明帝時人也少好有道遵奉法戒至心苦行日中菜食鍊形守精不遘外物或遊山林屏棄風塵志願憑子晋於緱岑侣陵陽以步玄故改名為玄子而自字為延期矣亦見道學傳第四小劫經云凡燒香朝禮日中一食道學傳第四又云范豺巴西閬中人也白晢而美髮秀眉明目容止都雅不言先見不說機祥間恬無欲終日默然結絡敗布以繩為網披苫才得蔽形冬夏徒跣腳不皴裂四時無寢太元十四年到荆州居于南郡枝江縣之富城洲尾巴芒中亦有屋宇不障風霜以桑柴為牀東藁插其間有一空簞一瓦瓶裝檐枕倚以卧或有十日荷檐乞食口絶粳梁醪醴滋味果實唯粗粟飯菜羹食一升許便過旬日也第十卷云東鄉超宗字逸偷高密黔陬人也幼而離俗不涉婚宦立行精懇人所不堪日中而餐餐止麻麥門人眷屬皆慕蔬肴所處精廬鮮味不進也住希玄館梁武帝三教兼弘制皆菜食雖有詔勑罕能遵用逸倫奉行於是館中法衆莫不菜蔬私有犯觸即加斥遣乃至厨醮不血味遠近嗟稱獨為清素也又云方謙之字道沖冀州趙郡柏縣人也外身濟物齊則六時六時必十方懺世中罕能隨者乃多獨而行道臨當壽終廢齊七日而亡也又云章旻字高眀宣城人也乃斥遣妻拏出家受道蔬食長齊常以七尺虛幻無勞愛惜隱安吳山靜處絶糧二十餘日凶人猛獸依其所止氣命羸微親賓固請進食乃暫許之粗已平復陳大建元年更絶飲食云將護此身會非長達無益群生不營久住修道立行何必在此欲有更勸請者拒而不納也第十八卷云沈法羲字世貞吳興武康人也住岝崿山大弘道士每以正月十五日招集道俗建邑齊繞山續明也上清大洞戒九十二條科云修雌一之道平旦可小食勿令飽日中大食過此以後聽甘木果也靈寶齊戒威儀經訣下云道士長齊過中聽飲清水飲而絶食平旦飲粥日中菜食抱朴子曰洪意謂大齊日數多者或是貴人或是道士體素羸劣不堪旦夕六時禮拜愚欲晝三時燒香禮拜夜可闕也若欲一日一夜齊此可六時行道也太真科上卷云學道樂生好法修術長齊菜食得道乃休此第一業也次齊千日百日月日節食粗食服氣服藥飴食隨堪密行其間他事公私之急皆聽暫解事竟續之心形無怠尅成真仙空名苟修怠慢增考科曰凡一年正月三月五月七月九月十一月此六月應齊又一月之中一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日此十日名曰十直齊皆天神下降精修得福也太真科下曰長齊六時隨力所堪大法常修習經講吉日集齊皆可三時行道拔度先亡救濟危疾解罪度厄悉六時行道三時上經講者兩時夜可覆講亦可誦經也又云凡身為教主習道率人居宇有常衣服有法動靜可觀所作可則是以聖人抱一為天下式行化守一天下同歸歸乎清虛守靜唯篤未能無待常學少私稍遣世務三業可修修三業守一以齊為本齊者齊也潔也靜也不必六時行道三時講經晝夜存神懺悔請福干噪玄靈更失其一能得一者必由攝三能攝身者端拱不擾能攝口者默識密明能攝心者神與道合如斯為主成聖真仙未全此者攝身朝禮離殺盜淫也攝口誦經免妄言綺語兩舌罵詈攝心存神脫貪恚癡十惡既去十善自來與道合真不能爾者勿妄為師彊立治化利養是規也赤書玉訣下云太玄上宫北帝常以庚申日制天民三尸魂神條人罪狀上奏帝君當以是日能修齊奉戒晝夜思神則三尸不得上天言人之罪地司奏人善功列言帝君太一歡喜即記名左契長為種民也太上上宫至真尊神常以甲子日遣太一中臺大使者下周行諸天諸地檢校神祇支散雜俗鬼精若其日能攝齊燒香中臺大使者皆條善功奏上三天上帝上帝即為除監天領地上鬼神主書名玉曆長為真人法輪經云長齊幽阜不倦晝冥切柏中餐潭水霐澄息影巖穴獨宿孤征與鹿為群倚林棲形窮獸對蹲飛鳥哀鳴風雲悽切萬古沈零凝水填澗素雪翳庭寒厲切肌志勵殊精契闊林岫艱苦備嬰勞不敢倦極不敢寧展轉求道遂感皇情道學傳第二云張天師棄家學道負經而行入嵩高山石室隱齊九年周流五嶽精思積感真降道成號曰天師諸經中長齊事大有此不具也三洞珠囊卷之五
